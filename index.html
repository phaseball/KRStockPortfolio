<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국내주식 포트폴리오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
<style>
  :root {
    --bg: #0e1014;
    --bg-elev: #16191f;
    --bg-card: #1c2028;
    --border: #2a2f3a;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --text-faint: #5f6368;
    --accent: #4f9cf9;
    --gain: #ef4444;
    --loss: #3b82f6;
    --warn: #ffb74d;
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  body { padding-bottom: 80px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .text-dim { color: var(--text-dim); }
  .text-faint { color: var(--text-faint); }
  .gain { color: var(--gain); }
  .loss { color: var(--loss); }
  .accent { color: var(--accent); }

  /* Header */
  .header {
    background: var(--bg-elev); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 50;
  }
  .header-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--border); }
  .icon-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .icon-btn.primary:hover { filter: brightness(1.1); }
  .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Nav tabs */
  .nav {
    display: flex; gap: 4px; padding: 12px 16px; background: var(--bg-elev);
    border-bottom: 1px solid var(--border); overflow-x: auto;
  }
  .nav-btn {
    background: transparent; border: 0; color: var(--text-dim); padding: 8px 14px;
    font-size: 14px; cursor: pointer; border-radius: 8px; white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--text); background: var(--bg-card); }
  .nav-btn.active { color: var(--text); background: var(--bg-card); font-weight: 600; }

  /* Cards */
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; box-shadow: var(--shadow);
  }
  .cards-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; margin-bottom: 16px;
  }
  .summary-card { padding: 14px 16px; }
  .summary-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
  .summary-card .value { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .summary-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-family: ui-monospace, monospace; }
  .summary-card .row2 { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .summary-card .row2 .meta { font-size: 10px; color: var(--text-faint); font-family: ui-monospace, monospace; line-height: 1.6; text-align: right; white-space: nowrap; }
  .summary-card .pair { display: flex; gap: 20px; align-items: baseline; margin-top: 4px; }
  .summary-card .pair .item .lbl { font-size: 10px; color: var(--text-faint); }
  .summary-card .pair .item .v { font-size: 16px; font-weight: 700; }

  /* Holdings header + row: 5 columns × 2 rows */
  .hold-hdr {
    display: grid;
    grid-template-columns: 1.6fr 1.1fr 1.1fr 1.1fr 1.2fr;
    gap: 10px; padding: 6px 14px; font-size: 10px; color: var(--text-faint);
    border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 1;
  }
  .holding-row {
    display: grid;
    grid-template-columns: 1.6fr 1.1fr 1.1fr 1.1fr 1.2fr;
    gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; align-items: center;
  }
  .holding-row:hover { background: rgba(255,255,255,0.02); }
  .holding-row:last-child { border-bottom: 0; }
  .hold-cell { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .hold-cell .top { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hold-cell .bot { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .holding-name { font-weight: 600; font-size: 14px; }
  .holding-code { font-size: 11px; color: var(--text-faint); font-family: ui-monospace, monospace; }

  /* History table */
  .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .history-table th, .history-table td {
    padding: 10px 8px; text-align: right; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .history-table th {
    color: var(--text-dim); font-weight: 500; font-size: 12px;
    background: var(--bg-elev); position: sticky; top: 0;
  }
  .history-table th:first-child, .history-table td:first-child { text-align: left; }
  .history-table th:nth-child(2), .history-table td:nth-child(2) { text-align: left; }
  .history-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  /* Inputs */
  input[type="text"], input[type="number"], input[type="password"] {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 8px 10px; font-size: 14px; width: 100%;
    font-family: inherit;
  }
  input:focus { outline: 0; border-color: var(--accent); }
  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
  .field { margin-bottom: 12px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; box-shadow: var(--shadow); display: none; z-index: 100;
    max-width: 90%;
  }
  #toast.show { display: block; }
  #toast.error { border-color: var(--loss); color: var(--loss); }
  #toast.success { border-color: var(--gain); color: var(--gain); }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty .emoji { font-size: 32px; margin-bottom: 8px; }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 8px; padding: 10px 0; flex-wrap: wrap; align-items: center;
  }
  .filter-bar select, .filter-bar input {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 6px 10px; font-size: 13px;
    font-family: inherit;
  }

  /* Ticker history view */
  .back-btn { background: transparent; border: 0; color: var(--accent); cursor: pointer; font-size: 14px; margin-bottom: 12px; padding: 4px 0; }
  .back-btn:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .summary-card .value { font-size: 17px; }
    .cards-grid { grid-template-columns: 1fr; }
    .hold-hdr { display: none; }
    .holding-row { grid-template-columns: 1fr 1fr; row-gap: 4px; }
    .hold-cell .top { font-size: 12px; }
    .hold-cell .bot { font-size: 10px; }
    .history-table { font-size: 12px; }
    .history-table th, .history-table td { padding: 8px 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <div style="flex:1;min-width:0">
    <div class="header-title">📈 국내주식 포트폴리오</div>
    <div style="font-size:11px;color:var(--text-faint);margin-top:2px;font-family:ui-monospace,monospace">
      <span id="verInfo">v —</span> · <span id="priceInfo">시세 —</span>
    </div>
  </div>
  <div class="header-actions">
    <span id="conn-status" style="font-size:12px;color:var(--text-dim);margin-right:4px">⚪ 미연결</span>
    <button class="icon-btn primary" id="refresh-btn" onclick="refreshAll()">🔄</button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" data-tab="overview" onclick="switchTab('overview')">📊 개요</button>
  <button class="nav-btn" data-tab="history" onclick="switchTab('history')">📜 거래내역</button>
  <button class="nav-btn" data-tab="input" onclick="switchTab('input')">📝 입력</button>
  <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">⚙️ 설정</button>
</div>

<div class="container">
  <div id="tab-overview" class="tab-content"></div>
  <div id="tab-history" class="tab-content" style="display:none"></div>
  <div id="tab-input" class="tab-content" style="display:none"></div>
  <div id="tab-settings" class="tab-content" style="display:none"></div>
</div>

<div id="toast"></div>

<script>
// ============ CONFIG ============
const STORAGE_KEY = 'kr_tracker_v1';
const TX_TAB = '삼성국내';
const NAMES_TAB = 'kr_names';
const CONFIG_TAB = 'config_kr';
const DAILY_TAB = 'daily_value_kr';
// Build timestamp — bump when shipping a new version
const BUILD_TIME = '0514-14:33';

// Known KR stock splits — applied automatically via 설정 → "분할 마커 자동 추가"
// Format: rows with `code === X` AND `date < before` get `split = Y` in column G.
// Add new entries here when new splits happen.
const SPLIT_MARKERS = [
  { code: 'A010120', name: 'LS일렉트릭', before: '2026-04-13', split: '1/5' },
];

// ============ STATE ============
let state = {
  saKey: null,         // parsed Service Account JSON
  saKeyRaw: '',        // raw JSON string for re-display
  sheetId: '',
  initialCash: 0,
  accessToken: null,
  tokenExpiry: 0,
  transactions: [],
  names: {},
  prices: {},
  codeMarket: {},      // code → '.KS' or '.KQ' (cached after first fetch)
  lastPriceFetchAt: 0, // epoch ms of last successful price fetch
  selectedCode: null,
  currentTab: 'overview',
};

function saveLocal() {
  const persist = {
    saKeyRaw: state.saKeyRaw,
    sheetId: state.sheetId,
    initialCash: state.initialCash,
    transactions: state.transactions,
    names: state.names, prices: state.prices,
    codeMarket: state.codeMarket,
    lastPriceFetchAt: state.lastPriceFetchAt,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(persist)); } catch (e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      Object.assign(state, p);
      if (state.saKeyRaw) {
        try { state.saKey = JSON.parse(state.saKeyRaw); } catch (e) {}
      }
    }
  } catch (e) {}
}

// ============ UTILS ============
// All numeric output: 만(萬, 10,000) unit, NO thousand-separator commas.
// Adaptive variant: magnitude-scaled decimals + "만" suffix (totals, P/L).
function fmtMan(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const man = n / 10000;
  const abs = Math.abs(man);
  const sign = man < 0 ? '-' : '';
  let s;
  if (abs >= 1000) s = Math.round(abs).toString();
  else if (abs >= 10) s = abs.toFixed(1);
  else s = abs.toFixed(2);
  return sign + s + '만';
}
// + sign for positives (used for P/L). Same body as fmtMan with leading '+'.
function fmtManSigned(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (n > 0) return '+' + fmtMan(n);
  return fmtMan(n);
}
// Fixed 2 decimals, no '만' suffix — for prices (평단/현재가/단가) and 정산금액
function fmtMan2(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n / 10000).toFixed(2);
}
// Fixed 3 decimals, no '만' suffix — for 수수료
function fmtMan3(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n / 10000).toFixed(3);
}
function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toString();
}
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const s = (n * 100).toFixed(2) + '%';
  return n > 0 ? '+' + s : s;
}
// "(d% / 1w%)" — colored, in parens; returns '' if no data
function fmtChangePcts(priceObj) {
  if (!priceObj) return '';
  const d = priceObj.changeRate, w = priceObj.week1Rate;
  if ((d === null || d === undefined) && (w === null || w === undefined)) return '';
  const parts = [];
  if (d !== null && d !== undefined) parts.push(`<span class="${plClass(d)}">${fmtPct(d)}</span>`);
  if (w !== null && w !== undefined) parts.push(`<span class="${plClass(w)}">${fmtPct(w)}</span>`);
  return ` (${parts.join(' / ')})`;
}
function plClass(n) {
  if (n === null || n === undefined || isNaN(n) || n === 0) return '';
  return n > 0 ? 'gain' : 'loss';
}
function signed(n) {
  if (n > 0) return '+' + n.toString();
  return n.toString();
}

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { t.className = ''; }, 4000);
}

function stripA(code) { return code.startsWith('A') ? code.slice(1) : code; }

// ============ AUTH (Service Account JWT) ============
async function getAccessToken() {
  if (state.accessToken && Date.now() < state.tokenExpiry - 60000) return state.accessToken;
  if (!state.saKey || !state.saKey.client_email || !state.saKey.private_key) {
    throw new Error('서비스 계정 JSON이 없습니다 (설정 탭에서 입력)');
  }
  if (!window.KJUR) throw new Error('JWT 라이브러리 로드 실패 (인터넷 연결 확인)');

  const now = Math.floor(Date.now() / 1000);
  const header = { alg: 'RS256', typ: 'JWT' };
  const payload = {
    iss: state.saKey.client_email,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    iat: now,
    exp: now + 3600,
  };
  const jwt = KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), state.saKey.private_key);

  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`,
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error('Google Auth 실패: ' + (err.error_description || resp.status));
  }
  const d = await resp.json();
  state.accessToken = d.access_token;
  state.tokenExpiry = Date.now() + (d.expires_in * 1000);
  updateConnStatus(true);
  return state.accessToken;
}

function isConfigured() {
  return !!(state.saKey && state.saKey.client_email && state.saKey.private_key && state.sheetId);
}

function updateConnStatus(connected) {
  const el = document.getElementById('conn-status');
  if (!el) return;
  if (connected) { el.textContent = '🟢 연결됨'; el.style.color = 'var(--gain)'; }
  else if (isConfigured()) { el.textContent = '🟡 설정됨'; el.style.color = 'var(--warn)'; }
  else { el.textContent = '⚪ 미연결'; el.style.color = 'var(--text-dim)'; }
}

function updateHeaderInfo() {
  const ver = document.getElementById('verInfo');
  if (ver) ver.textContent = 'v' + BUILD_TIME;
  const pf = document.getElementById('priceInfo');
  if (pf) {
    if (state.lastPriceFetchAt) {
      const d = new Date(state.lastPriceFetchAt);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      pf.textContent = `시세 ${mm}${dd}-${hh}:${mi}`;
    } else {
      pf.textContent = '시세 —';
    }
  }
}

// ============ GOOGLE SHEETS API ============
async function sheetGet(range) {
  const token = await getAccessToken();
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE&dateTimeRenderOption=FORMATTED_STRING`;
  const r = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) throw new Error('Sheet 읽기 실패: ' + r.status);
  const d = await r.json();
  return d.values || [];
}

async function sheetAppend(range, rows) {
  const token = await getAccessToken();
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: rows }),
  });
  if (!r.ok) throw new Error('Sheet 쓰기 실패: ' + r.status);
  return r.json();
}

async function sheetCreate(title) {
  const token = await getAccessToken();
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}:batchUpdate`;
  const r = await fetch(url, {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ requests: [{ addSheet: { properties: { title } } }] }),
  });
  return r.ok;
}

// Robust number parse: handles numbers, "10,380", "₩10,380", "", null
function parseNum(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return v;
  if (typeof v === 'string') {
    const cleaned = v.replace(/[^0-9.\-]/g, '');
    const n = Number(cleaned);
    return isNaN(n) ? 0 : n;
  }
  return 0;
}

// Normalize date: accepts "2025-03-21", "2025/03/21", "3/21/2025", serial number, etc. → "YYYY-MM-DD"
function parseDate(v) {
  if (v === null || v === undefined || v === '') return '';
  if (typeof v === 'number') {
    const ms = Math.round((v - 25569) * 86400000);
    const d = new Date(ms);
    if (isNaN(d.getTime())) return String(v);
    return d.toISOString().slice(0, 10);
  }
  if (typeof v === 'string') {
    const s = v.trim();
    // ISO-like: YYYY-MM-DD / YYYY/MM/DD / YYYY.MM.DD
    let m = s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
    if (m) {
      return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
    }
    // US/short: M/D/YYYY or MM/DD/YYYY (or .-separated)
    m = s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/);
    if (m) {
      return `${m[3]}-${m[1].padStart(2, '0')}-${m[2].padStart(2, '0')}`;
    }
    // Fallback: try Date.parse
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
    return s.slice(0, 10);
  }
  return String(v);
}

// Parse split marker "N/M" or plain number → multiplier (price *= mul, qty /= mul)
// "1/5" → 0.2 (forward 1:5: pre-split price was 5×, qty was 1/5×)
// "5"   → 5   (reverse 5:1: pre-split price was 1/5×, qty was 5×)
function parseSplitMul(s) {
  if (!s) return 1;
  const str = String(s).trim();
  if (!str) return 1;
  const parts = str.split('/');
  if (parts.length === 2) {
    const num = parseFloat(parts[0]);
    const den = parseFloat(parts[1]);
    if (num && den) return num / den;
  } else {
    const v = parseFloat(str);
    if (v && v !== 0) return v;
  }
  return 1;
}

// ============ DATA LOADING ============
async function loadTransactions() {
  const rows = await sheetGet(`${TX_TAB}!A:G`);   // now reads column G (split) too
  if (rows.length < 2) return [];
  const out = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0]) continue;
    const origPrice = parseNum(r[2]);
    const origQty = parseNum(r[3]);
    const fees = parseNum(r[4]);
    const settle = parseNum(r[5]);
    const splitRaw = r[6] ? String(r[6]).trim() : '';
    const mul = parseSplitMul(splitRaw);
    out.push({
      date: parseDate(r[0]),
      code: String(r[1] || '').trim(),
      // Split-normalized values (used in all calculations)
      price: origPrice * mul,
      qty: origQty / mul,
      // Originals (kept for reference / display)
      origPrice, origQty, splitRaw,
      // Fees and settle don't change with splits (total money flow is fixed)
      fees,
      settle,
      seq: i,
    });
  }
  // Sort: date asc, then BUYS BEFORE SELLS on the same day (handles intraday
  // day-trades where PDF order isn't strictly chronological), then sheet row order.
  out.sort((a, b) => {
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    const aIsBuy = a.qty > 0 ? 0 : 1;
    const bIsBuy = b.qty > 0 ? 0 : 1;
    if (aIsBuy !== bIsBuy) return aIsBuy - bIsBuy;
    return a.seq - b.seq;
  });
  return out;
}

async function loadNames() {
  try {
    const rows = await sheetGet(`${NAMES_TAB}!A:B`);
    const map = {};

}

// ============ PRICE FETCHING ============
// Yahoo Finance for KR stocks: numeric code + ".KS" (KOSPI) or ".KQ" (KOSDAQ)
const CORS_PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
];

// Single-symbol fetch returning full meta+series snapshot. Caller decides which to keep.
async function _fetchYahooOne(symbol, range = '1mo') {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=${range}`;
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const d = await r.json();
      const result = d?.chart?.result?.[0];
      if (!result) continue;
      const meta = result.meta;
      const price = meta?.regularMarketPrice;
      if (!price) continue;
      const ts = result.timestamp || [];
      const rawCloses = result.indicators?.quote?.[0]?.close || [];
      const series = [];
      for (let i = 0; i < ts.length; i++) {
        if (rawCloses[i] != null) series.push({ ts: ts[i], close: Number(rawCloses[i]) });
      }
      return {
        price: Number(price),
        meta,
        marketTime: Number(meta.regularMarketTime || 0),
        exchangeName: meta.exchangeName || '',
        series,
      };
    } catch (e) { /* try next proxy */ }
  }
  return null;
}

// Try Yahoo with both .KS and .KQ; pick the one with the most recent regularMarketTime.
// (Yahoo may return stale data for a delisted listing under one suffix while the active
// listing lives under the other suffix — for example 에스티큐브 052020 is KOSDAQ, but
// 052020.KS could return cached data for a different/delisted stock.)
async function fetchYahooPrice(code) {
  const numCode = stripA(code);
  const cached = state.codeMarket?.[code];
  const suffixes = cached ? [cached] : ['.KS', '.KQ'];

  const results = await Promise.all(suffixes.map(async sfx => {
    const snap = await _fetchYahooOne(numCode + sfx);
    return snap ? { sfx, snap } : null;
  }));
  const valid = results.filter(r => r);
  if (!valid.length) {
    // If we tried only the cached suffix, retry the other one as fallback
    if (cached) {
      const other = cached === '.KS' ? '.KQ' : '.KS';
      const snap = await _fetchYahooOne(numCode + other);
      if (snap) valid.push({ sfx: other, snap });
    }
    if (!valid.length) return null;
  }
  // Pick the listing with the most recent market time (active vs stale)
  valid.sort((a, b) => b.snap.marketTime - a.snap.marketTime);
  const winner = valid[0];

  // Compute yesterday/1w from the series (today's bar excluded)
  const todayISO = new Date().toISOString().slice(0, 10);
  const past = winner.snap.series.filter(s => new Date(s.ts * 1000).toISOString().slice(0, 10) < todayISO);
  const yesterdayClose = past.length > 0 ? past[past.length - 1].close : null;
  const week1Close = past.length >= 5 ? past[past.length - 5].close : null;
  const price = winner.snap.price;
  const changeRate = yesterdayClose ? (price - yesterdayClose) / yesterdayClose : null;
  const week1Rate = week1Close ? (price - week1Close) / week1Close : null;

  // Cache market suffix
  if (!state.codeMarket) state.codeMarket = {};
  state.codeMarket[code] = winner.sfx;

  return {
    price,
    changeRate,
    week1Rate,
    asOf: new Date().toISOString().slice(0, 10),
    market: winner.sfx,
    exchangeName: winner.snap.exchangeName,
  };
}

async function fetchAllPrices(codes) {
  const results = {};
  const failed = [];
  const batchSize = 5;
  for (let i = 0; i < codes.length; i += batchSize) {
    const batch = codes.slice(i, i + batchSize);
    const out = await Promise.all(batch.map(c => fetchYahooPrice(c)));
    batch.forEach((c, idx) => {
      if (out[idx]) results[c] = out[idx];
      else failed.push(c);
    });
  }
  return { results, failed };
}

// Single-symbol historical fetch. Caller picks.
async function _fetchYahooHistOne(symbol, fromTs, toTs) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${fromTs}&period2=${toTs}&interval=1d`;
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(20000) });
      if (!r.ok) continue;
      const d = await r.json();
      const result = d?.chart?.result?.[0];
      if (!result) continue;
      const ts = result.timestamp || [];
      const quote = result.indicators?.quote?.[0] || {};
      const adjclose = result.indicators?.adjclose?.[0]?.adjclose || [];
      const close = quote.close || [];
      const map = {};
      let latestTs = 0;
      for (let i = 0; i < ts.length; i++) {
        const c = adjclose[i] ?? close[i];
        if (c != null) {
          const date = new Date(ts[i] * 1000).toISOString().slice(0, 10);
          map[date] = Number(c);
          if (ts[i] > latestTs) latestTs = ts[i];
        }
      }
      if (Object.keys(map).length > 0) return { map, latestTs, count: Object.keys(map).length };
    } catch (e) { /* next proxy */ }
  }
  return null;
}

// Historical daily closes via Yahoo. Uses cached suffix if available; otherwise
// dual-fetches and picks by most recent data.
async function fetchHistoricalPrices(code, fromDate, toDate) {
  const numCode = stripA(code);
  const fromTs = Math.floor(new Date(fromDate + 'T00:00:00Z').getTime() / 1000);
  const toTs = Math.floor(new Date(toDate + 'T00:00:00Z').getTime() / 1000) + 86400;
  const cached = state.codeMarket?.[code];
  const suffixes = cached ? [cached] : ['.KS', '.KQ'];

  const results = await Promise.all(suffixes.map(async sfx => {
    const snap = await _fetchYahooHistOne(numCode + sfx, fromTs, toTs);
    return snap ? { sfx, ...snap } : null;
  }));
  let valid = results.filter(r => r);
  if (!valid.length && cached) {
    const other = cached === '.KS' ? '.KQ' : '.KS';
    const snap = await _fetchYahooHistOne(numCode + other, fromTs, toTs);
    if (snap) valid = [{ sfx: other, ...snap }];
  }
  if (!valid.length) return {};
  // Prefer the listing with most recent data, then more data points
  valid.sort((a, b) => (b.latestTs - a.latestTs) || (b.count - a.count));
  const winner = valid[0];
  if (!state.codeMarket) state.codeMarket = {};
  state.codeMarket[code] = winner.sfx;
  return winner.map;
}

// Concurrency-limited parallel historical fetch
async function fetchAllHistorical(codes, fromDate, toDate, onProgress) {
  const result = {};
  const failed = [];
  const concurrency = 4;
  let done = 0;
  for (let i = 0; i < codes.length; i += concurrency) {
    const batch = codes.slice(i, i + concurrency);
    const histories = await Promise.all(batch.map(c => fetchHistoricalPrices(c, fromDate, toDate)));
    batch.forEach((c, idx) => {
      const h = histories[idx];
      if (Object.keys(h).length > 0) result[c] = h;
      else failed.push(c);
    });
    done += batch.length;
    if (onProgress) onProgress(done, codes.length);
  }
  return { result, failed };
}

// ============ ANALYTICS ============
// Moving-average cost basis (matches StockPortfolio v4):
//   Buy:  newAvgCost = (avgCost * qty + tx.qty * tx.price) / (qty + tx.qty)   [gross price, no fees]
//   Sell: realizedPL = sellQty * (tx.price - avgCost) - tx.fees               [fees deducted from PL]
//   avgCost is preserved across partial sells; clamps to 0 when qty<=0
function computeHoldings(txs) {
  const holds = {};
  const curYear = new Date().getFullYear().toString();
  for (const tx of txs) {
    if (!tx.code) continue;
    if (!holds[tx.code]) holds[tx.code] = { qty: 0, avgCost: 0, realizedPL: 0, realizedPLThisYear: 0, buyCount: 0, sellCount: 0 };
    const h = holds[tx.code];
    if (tx.qty > 0) {
      // Buy: update moving average using gross price (fees NOT added to cost basis)
      const newCost = h.avgCost * h.qty + tx.qty * tx.price;
      h.qty += tx.qty;
      h.avgCost = h.qty > 0 ? newCost / h.qty : 0;
      h.buyCount++;
    } else if (tx.qty < 0) {
      // Sell: realized PL using moving-avg basis, fees deducted
      const sellQty = -tx.qty;
      const pl = sellQty * (tx.price - h.avgCost) - tx.fees;
      h.realizedPL += pl;
      if (tx.date.startsWith(curYear)) h.realizedPLThisYear += pl;
      h.qty -= sellQty;
      h.sellCount++;
      if (h.qty <= 0) { h.qty = 0; h.avgCost = 0; }
    }
  }
  return holds;
}

function computeSummary(txs, holds, prices) {
  // Cash: tracks actual cash flow including fees (settle column = gross ± fees)
  let buyTotal = 0, sellTotal = 0, feesTotal = 0;
  for (const tx of txs) {
    feesTotal += tx.fees;
    if (tx.qty > 0) buyTotal += tx.settle;      // settle for buy = price*qty + fees
    else sellTotal += tx.settle;                 // settle for sell = price*qty - fees
  }
  const cash = state.initialCash - buyTotal + sellTotal;

  // Holdings sums
  let marketValue = 0, unrealizedPL = 0, costBasis = 0, realizedPL = 0, realizedPLYTD = 0;
  for (const code of Object.keys(holds)) {
    const h = holds[code];
    realizedPL += h.realizedPL;
    realizedPLYTD += h.realizedPLThisYear;
    if (h.qty > 0) {
      const lineCost = h.qty * h.avgCost;
      costBasis += lineCost;
      const p = prices[code] ? prices[code].price : null;
      if (p) {
        const mv = h.qty * p;
        marketValue += mv;
        unrealizedPL += mv - lineCost;
      } else {
        marketValue += lineCost;  // fallback when no price available
      }
    }
  }
  const totalAsset = cash + marketValue;
  const totalGain = totalAsset - state.initialCash;
  return { cash, marketValue, unrealizedPL, costBasis, realizedPL, realizedPLYTD, totalAsset, totalGain, buyTotal, sellTotal, feesTotal };
}

  state.currentTab = name;

}

  const root = document.getElementById('tab-overview');

        <div class="label">💵 현금</div>
        <div class="value">${fmtMan(sum.cash)}</div>

      </div>

        <div class="label">💰 총수익 ${earnPctTotal !== null ? `<span class="${plClass(earnPctTotal)}">(${fmtPct(earnPctTotal)})</span>` : ''}</div>
        <div class="row2">
          <div class="value ${plClass(sum.totalGain)}" style="white-space:nowrap">${fmtManSigned(sum.totalGain)}</div>
          <div class="meta">자산&nbsp;${fmtMan(sum.totalAsset)}<br>초기&nbsp;${fmtMan(state.initialCash)}</div>
        </div>
      </div>
      <div class="card summary-card">
        <div class="label">📊 실현손익</div>
        <div class="pair">
          <div class="item"><div class="lbl">YTD</div><div class="v ${plClass(sum.realizedPLYTD)}">${fmtManSigned(sum.realizedPLYTD)}</div></div>
          <div class="item"><div class="lbl">total</div><div class="v ${plClass(sum.realizedPL)}">${fmtManSigned(sum.realizedPL)}</div></div>
        </div>
      </div>
    </div>
  `;

  // Holdings list (only those with qty > 0)
  const heldCodes = Object.keys(holds).filter(c => holds[c].qty > 0);
  heldCodes.sort((a, b) => {
    const pa = state.prices[a] ? state.prices[a].price : holds[a].avgCost;
    const pb = state.prices[b] ? state.prices[b].price : holds[b].avgCost;
    return (holds[b].qty * pb) - (holds[a].qty * pa);
  });

  const holdingsHtml = heldCodes.length === 0
    ? `<div class="empty"><div class="emoji">💼</div><div>현재 보유 종목 없음</div></div>`
    : `<div class="hold-hdr">
          <div>종목 · 수량</div>
          <div>평단 / 현재가 (어제/1주)</div>
          <div>평가손익 / 수익률</div>
          <div>평가금액 / 매수금액</div>
          <div>실현 YTD / total</div>
        </div>` +
      heldCodes.map(code => {
        const h = holds[code];
        const name = state.names[code] || code;

        const lineCost = h.qty * h.avgCost;
        const value = curPrice ? h.qty * curPrice : null;
        const upl = curPrice ? value - lineCost : null;

        return `

              <div class="top ${plClass(upl)}">${upl !== null ? fmtManSigned(upl) : '—'}</div>

            </div>

              <div class="bot">${fmtMan(lineCost)}</div>

              <div class="top ${plClass(h.realizedPLThisYear)}">${fmtManSigned(h.realizedPLThisYear)}</div>

          </div>
        `;

  const holdingsCard = `<div class="card" style="padding:0">
    <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <h2 style="margin:0">보유 종목 (${heldCodes.length})</h2>
      <div style="font-size:11px;color:var(--text-faint)">${pricesAsOfStr()}</div>
    </div>
    ${holdingsHtml}
  </div>`;

  root.innerHTML = cards + holdingsCard;
}

function pricesAsOfStr() {
  const dates = Object.values(state.prices).map(p => p.asOf).filter(Boolean);
  if (!dates.length) return '시세 미수집';
  return '시세 기준: ' + dates.sort().slice(-1)[0];
}

function selectTicker(code) { state.selectedCode = code; renderOverview(); }

function renderTickerDetail(code) {
  const root = document.getElementById('tab-overview');
  const name = state.names[code] || code;
  const txs = state.transactions.filter(t => t.code === code);
  const holds = computeHoldings(state.transactions);
  const h = holds[code] || { qty: 0, avgCost: 0, realizedPL: 0 };
  const priceObj = state.prices[code];
  const curPrice = priceObj ? priceObj.price : null;
  const lineCost = h.qty * h.avgCost;
  const value = curPrice && h.qty > 0 ? h.qty * curPrice : null;
  const upl = value !== null ? value - lineCost : null;
  const uplPct = curPrice && h.avgCost > 0 ? (curPrice - h.avgCost) / h.avgCost : null;

  const summary = `
    <div class="cards-grid">
      <div class="card summary-card"><div class="label">보유수량</div><div class="value">${h.qty.toString()}주</div><div class="sub">평단 ${fmtMan2(h.avgCost)}</div></div>
      <div class="card summary-card"><div class="label">현재가</div><div class="value">${curPrice ? fmtMan2(curPrice) : '—'}</div><div class="sub">${fmtChangePcts(priceObj).trim() || ''}</div></div>
      <div class="card summary-card"><div class="label">평가손익</div><div class="value ${plClass(upl)}">${fmtManSigned(upl)}</div><div class="sub ${plClass(uplPct)}">${fmtPct(uplPct)}</div></div>
      <div class="card summary-card"><div class="label">실현손익</div><div class="value ${plClass(h.realizedPL)}">${fmtManSigned(h.realizedPL)}</div></div>
    </div>
  `;

  // Transactions table for this code, processed in the SAME order as the holdings compute
  // (date asc, buys-first within same date, then sheet row order)
  // — this is what the running balance reflects.
  const txsForCode = state.transactions.filter(t => t.code === code);
  let runningQty = 0;
  let clampEvents = 0;
  const walked = txsForCode.map(t => {
    if (t.qty > 0) {
      runningQty += t.qty;
    } else {
      runningQty += t.qty;  // already negative
      if (runningQty < 0) clampEvents++;
      if (runningQty <= 0) runningQty = 0;  // v4 clamp
    }
    return { ...t, runningQty };
  });

  const rows = [...walked].reverse().map(t => {
    const splitBadge = t.splitRaw ? ` <span style="color:var(--warn);font-size:10px">[split ${escapeHtml(t.splitRaw)}]</span>` : '';
    const qtyCell = t.splitRaw ? `${signed(t.qty)}<br><span class="text-faint" style="font-size:10px">(원본 ${signed(t.origQty)})</span>` : signed(t.qty);
    const priceCell = t.splitRaw ? `${fmtMan2(t.price)}<br><span class="text-faint" style="font-size:10px">(원본 ${fmtMan2(t.origPrice)})</span>` : fmtMan2(t.price);
    return `
    <tr>
      <td>${t.date}${splitBadge}</td>
      <td class="${t.qty > 0 ? 'gain' : 'loss'}">${t.qty > 0 ? '매수' : '매도'}</td>
      <td>${qtyCell}</td>
      <td>${priceCell}</td>
      <td>${fmtMan3(t.fees)}</td>
      <td>${fmtMan2(t.settle)}</td>
      <td><b>${t.runningQty.toString()}</b></td>
    </tr>
  `;
  }).join('');

  // Sanity check: simple sum vs current qty
  const simpleSum = txsForCode.reduce((s, t) => s + t.qty, 0);
  const matchHint = (simpleSum === h.qty)
    ? `<span style="color:var(--text-faint)">단순합 = 현재 보유수량 = ${h.qty}</span>`
    : `<span style="color:var(--warn)">⚠️ 단순합(${simpleSum}) ≠ 보유수량(${h.qty}) — clamping ${clampEvents}회 발생</span>`;

  root.innerHTML = `
    <button class="back-btn" onclick="state.selectedCode=null;renderOverview()">← 보유 종목으로</button>
    <h2 style="font-size:18px;margin-bottom:4px">${escapeHtml(name)}</h2>
    <div style="font-size:12px;color:var(--text-faint);font-family:ui-monospace,monospace;margin-bottom:16px">${code}</div>
    ${summary}
    <div class="card" style="padding:0">
      <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h2 style="margin:0">거래내역 (${txsForCode.length})</h2>
        <div style="font-size:11px">${matchHint}</div>
      </div>
      <div style="overflow-x:auto"><table class="history-table">
        <thead><tr><th>매매일</th><th>구분</th><th>수량</th><th>단가</th><th>수수료</th><th>정산금액</th><th>누적</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `;
}

// ============ INPUT (Sheet Append) ============
// v4 format:
//   #계정명 YYMMDD              ← header sets date for following rows; can appear multiple times
//   종목명,순번,가격(만원),수량   ← data row; qty signed (+매수 / −매도)
// Looks up code from kr_names by name. Estimates fees/거래세 from typical KR rates.
function parseInputRows(text) {
  const rows = [];
  const errors = [];
  let currentDate = null;
  let currentAccount = null;

  // Build name → code reverse lookup (case-insensitive, whitespace-stripped)
  const nameToCode = {};
  for (const [code, name] of Object.entries(state.names || {})) {
    if (!name) continue;
    const key = String(name).trim().replace(/\s+/g, '').toLowerCase();
    nameToCode[key] = code;
  }

  const lines = text.split(/\r?\n/);
  lines.forEach((rawLine, idx) => {
    const lineNum = idx + 1;
    const line = rawLine.trim();
    if (!line) return;

    // Header: #account YYMMDD (or YYYYMMDD)
    if (line.startsWith('#')) {
      const m = line.match(/^#\s*(\S+)\s+(\d{6,8})\s*$/);
      if (m) {
        currentAccount = m[1];
        const d = m[2];
        currentDate = d.length === 6
          ? `20${d.slice(0, 2)}-${d.slice(2, 4)}-${d.slice(4, 6)}`
          : `${d.slice(0, 4)}-${d.slice(4, 6)}-${d.slice(6, 8)}`;
      } else {
        errors.push(`${lineNum}행: 헤더 형식 오류 "${line}" (예: #삼성국내 260514)`);
      }
      return;
    }

    if (!currentDate) {
      errors.push(`${lineNum}행: 헤더(#계정 YYMMDD) 먼저 필요`);
      return;
    }

    const parts = line.split(',').map(p => p.trim());
    if (parts.length < 4) {
      errors.push(`${lineNum}행: 컬럼 부족 (${parts.length}개, 4개 필요: 종목명,순번,가격(만),수량)`);
      return;
    }

    const [name, seqRaw, priceManRaw, qtyRaw] = parts;
    const priceMan = parseFloat(priceManRaw);
    const qty = parseFloat(qtyRaw);

    if (!name) { errors.push(`${lineNum}행: 종목명 없음`); return; }
    if (isNaN(priceMan) || priceMan <= 0) {
      errors.push(`${lineNum}행: 가격(만원) 형식 오류 "${priceManRaw}"`); return;
    }
    if (isNaN(qty) || qty === 0) {
      errors.push(`${lineNum}행: 수량 형식 오류 "${qtyRaw}"`); return;
    }

    const nameKey = name.trim().replace(/\s+/g, '').toLowerCase();
    const code = nameToCode[nameKey];
    if (!code) {
      errors.push(`${lineNum}행: 종목명 "${name}" 코드 없음 (kr_names 탭에 등록 필요)`);
      return;
    }

    // Estimate fees (broker ~0.014%, KR trading tax 0.18% on sells)
    const price = Math.round(priceMan * 10000);
    const isBuy = qty > 0;
    const gross = price * Math.abs(qty);
    const brokerage = Math.round(gross * 0.00014);
    const tradingTax = isBuy ? 0 : Math.round(gross * 0.0018);
    const fees = brokerage + tradingTax;
    const settle = isBuy ? gross + fees : gross - fees;

    rows.push([currentDate, code, price, qty, fees, settle, '']);
  });

  // Warn if no rows parsed at all
  if (rows.length === 0 && errors.length === 0 && text.trim()) {
    errors.push('파싱된 행 없음 - 형식을 확인하세요');
  }

  return { rows, errors };
}

function previewInput() {
  const text = document.getElementById('input-textarea').value;
  if (!text.trim()) { toast('입력 내용 없음', 'error'); return; }
  lastParsedInput = parseInputRows(text);
  const txt = document.getElementById('input-textarea').value;  // preserve
  renderInput();
  document.getElementById('input-textarea').value = txt;
  if (lastParsedInput.errors.length) {
    toast(`${lastParsedInput.rows.length}건 정상 / ${lastParsedInput.errors.length}건 오류`, lastParsedInput.errors.length === lastParsedInput.errors.length + lastParsedInput.rows.length ? 'error' : '');
  } else {
    toast(`${lastParsedInput.rows.length}건 파싱 완료`, 'success');
  }
}

function clearInputForm() {
  document.getElementById('input-textarea').value = '';
  lastParsedInput = { rows: [], errors: [] };
  renderInput();
}

async function commitInput() {
  if (!isConfigured()) { toast('연결 설정 먼저', 'error'); return; }
  if (!lastParsedInput.rows.length) { toast('미리보기 먼저 실행', 'error'); return; }
  if (!confirm(`${lastParsedInput.rows.length}건을 ${TX_TAB} 시트에 추가합니다. 계속?`)) return;
  try {
    toast('Sheet에 추가 중...');
    await sheetAppend(`${TX_TAB}!A:G`, lastParsedInput.rows);
    toast(`✓ ${lastParsedInput.rows.length}건 추가 완료. 거래내역 다시 로드 중...`, 'success');
    lastParsedInput = { rows: [], errors: [] };
    clearInputForm();
    await refreshTransactions();
  } catch (e) {
    toast('추가 실패: ' + e.message, 'error');
  }
}

// ============ ACTIONS ============
function saveSettings() {
  const rawJson = document.getElementById('set-sa-json').value.trim();
  if (rawJson) {
    try {
      const parsed = JSON.parse(rawJson);
      if (!parsed.client_email || !parsed.private_key) {
        toast('JSON에 client_email 또는 private_key가 없습니다', 'error');
        return;
      }
      state.saKey = parsed;
      state.saKeyRaw = rawJson;
    } catch (e) {
      toast('JSON 파싱 실패: ' + e.message, 'error');
      return;
    }
  }
  state.sheetId = document.getElementById('set-sheet-id').value.trim();
  state.initialCash = Number(document.getElementById('set-initial-cash').value) || 0;
  // Reset cached token since key may have changed
  state.accessToken = null; state.tokenExpiry = 0;
  saveLocal();
  updateConnStatus(false);
  toast('저장됨. 연결 테스트를 눌러보세요.', 'success');
  renderSettings();
}

async function testConnection() {
  if (!isConfigured()) { toast('JSON과 Sheet ID를 먼저 저장하세요', 'error'); return; }
  try {
    toast('연결 시도 중...');
    await getAccessToken();
    // Try reading the sheet metadata to verify access
    const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}?fields=properties.title`, {
      headers: { Authorization: 'Bearer ' + state.accessToken }
    });
    if (!r.ok) {
      if (r.status === 403) throw new Error('403 권한 없음. 시트를 서비스 계정 이메일에 공유했는지 확인하세요.');
      if (r.status === 404) throw new Error('404 시트를 찾을 수 없습니다. Sheet ID를 확인하세요.');
      throw new Error('시트 접근 실패: ' + r.status);
    }
    const d = await r.json();
    toast(`✓ 연결 성공: ${d.properties.title}`, 'success');
    updateConnStatus(true);
  } catch (e) {
    toast('실패: ' + e.message, 'error');
    updateConnStatus(false);
  }
}

async function ensureTabs() {
  if (!isConfigured()) { toast('먼저 JSON과 Sheet ID를 저장하세요', 'error'); return; }
  try {
    for (const tab of [TX_TAB, NAMES_TAB, CONFIG_TAB, DAILY_TAB]) {
      try { await sheetCreate(tab); } catch (e) {}
    }
    try { await sheetAppend(`${TX_TAB}!A1`, [['매매일', '종목코드', '체결단가', '체결수량', '수수료', '정산금액', 'split']]); } catch (e) {}
    try { await sheetAppend(`${NAMES_TAB}!A1`, [['종목코드', '종목명']]); } catch (e) {}
    toast('탭 확인/생성 완료', 'success');
  } catch (e) {
    toast('실패: ' + e.message, 'error');
  }
}

// Recompute daily_value_kr from scratch.
// Schema: date | totalValue | cash | holdings | prices  (matches v4)
async function recalcDailyValues() {
  if (!isConfigured()) { toast('연결 설정 먼저', 'error'); return; }
  if (!state.transactions.length) { toast('거래내역 없음 — 먼저 새로고침', 'error'); return; }
  if (!confirm(`daily_value_kr 탭을 전체 재계산합니다.\n시세 API 호출에 ~30초~2분 소요. 계속?`)) return;

  try {
    // Sort with buys-first within same date (matches computeHoldings ordering)
    const sorted = [...state.transactions].sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      const aIsBuy = a.qty > 0 ? 0 : 1;
      const bIsBuy = b.qty > 0 ? 0 : 1;
      if (aIsBuy !== bIsBuy) return aIsBuy - bIsBuy;
      return a.seq - b.seq;
    });

    const fromDate = sorted[0].date;
    const today = new Date().toISOString().slice(0, 10);

    // Codes ever held with positive qty
    const everHeld = new Set();
    {
      const pos = {};
      for (const tx of sorted) {
        pos[tx.code] = (pos[tx.code] || 0) + tx.qty;
        if (pos[tx.code] > 0) everHeld.add(tx.code);
      }
    }
    const codes = [...everHeld];

    // Fetch historical prices in parallel
    toast(`시세 가져오는 중... 0/${codes.length}`);
    const { result: priceHistory, failed } = await fetchAllHistorical(
      codes, fromDate, today,
      (done, total) => { toast(`시세 가져오는 중... ${done}/${total}`); }
    );

    // Collect all dates (price dates ∪ tx dates)
    const allDates = new Set();
    for (const c in priceHistory) for (const d in priceHistory[c]) allDates.add(d);
    for (const tx of sorted) allDates.add(tx.date);
    const sortedDates = [...allDates].sort();
    if (!sortedDates.length) { toast('시세 데이터 없음', 'error'); return; }

    // Group transactions by date
    const txByDate = {};
    for (const tx of sorted) {
      if (!txByDate[tx.date]) txByDate[tx.date] = [];
      txByDate[tx.date].push(tx);
    }
    const txDatesSorted = Object.keys(txByDate).sort();

    // Walk through dates, build snapshots
    toast(`스냅샷 계산 중 (${sortedDates.length}일)...`);
    const out = [['date', 'totalValue', 'cash', 'holdings', 'prices']];
    let cash = state.initialCash;
    const positions = {};
    const lastKnown = {};  // forward-fill last observed price per code
    let txIdx = 0;

    for (const date of sortedDates) {
      // Apply all txs with date <= snapshot date
      while (txIdx < txDatesSorted.length && txDatesSorted[txIdx] <= date) {
        for (const tx of txByDate[txDatesSorted[txIdx]]) {
          positions[tx.code] = (positions[tx.code] || 0) + tx.qty;
          if (positions[tx.code] <= 0) positions[tx.code] = 0;
          if (tx.qty > 0) cash -= tx.settle;
          else cash += tx.settle;
        }
        txIdx++;
      }

      // EOD snapshot
      const holdings = {};
      const prices = {};
      let marketValue = 0;
      for (const code in positions) {
        if (positions[code] <= 0) continue;
        let p = priceHistory[code]?.[date];
        if (p) lastKnown[code] = p;
        else p = lastKnown[code];
        if (p) {
          prices[code] = p;
          const v = positions[code] * p;
          holdings[code] = Math.round(v);
          marketValue += v;
        }
      }

      out.push([
        date,
        Math.round(cash + marketValue),
        Math.round(cash),
        JSON.stringify(holdings),
        JSON.stringify(prices),
      ]);
    }

    // Write to Sheet (clear + put)
    toast(`${out.length - 1}일 시트에 저장 중...`);
    const token = await getAccessToken();
    try { await sheetCreate(DAILY_TAB); } catch (e) {}
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${encodeURIComponent(DAILY_TAB)}!A:E:clear`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: '{}',
    });
    const writeResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${encodeURIComponent(DAILY_TAB)}!A1?valueInputOption=USER_ENTERED`, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ range: `${DAILY_TAB}!A1`, values: out }),
    });
    if (!writeResp.ok) {
      const t = await writeResp.text().catch(() => '');
      throw new Error(`Sheet write ${writeResp.status}: ${t.slice(0, 200)}`);
    }

    const last = out[out.length - 1];
    const failedNote = failed.length ? ` (시세 실패 ${failed.length}종목)` : '';
    toast(`✓ ${out.length - 1}일 저장. 최종 총자산 ${fmtMan(last[1])}${failedNote}`, 'success');
    if (failed.length) console.warn('Codes without price history:', failed);
  } catch (e) {
    toast('실패: ' + e.message, 'error');
    console.error(e);
  }
}

// Write split marks to column G in the Sheet. Skips rows that already have a value.
async function applySplitMarkers() {
  if (!isConfigured()) { toast('먼저 JSON과 Sheet ID를 저장하세요', 'error'); return; }
  const desc = SPLIT_MARKERS.map(r => `• ${r.code} (${r.name || ''}): ${r.before} 이전 → ${r.split}`).join('\n');
  if (!confirm(`다음 분할 마커를 ${TX_TAB} 시트 G열에 추가합니다:\n\n${desc}\n\n기존 G열 값이 있는 행은 건너뜁니다.\n계속하시겠습니까?`)) return;
  try {
    toast('시트 읽는 중...');
    const rows = await sheetGet(`${TX_TAB}!A:G`);
    if (rows.length < 2) { toast('데이터 없음', 'error'); return; }

    const updates = [];
    let added = 0, skipped = 0;
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[0]) continue;
      const rowDate = parseDate(r[0]);
      const rowCode = String(r[1] || '').trim();
      const existing = r[6] !== undefined && r[6] !== null && String(r[6]).trim() !== '';
      for (const rule of SPLIT_MARKERS) {
        if (rowCode === rule.code && rowDate < rule.before) {
          if (existing) { skipped++; }
          else {
            // Sheet row number = array index i (since rows[0] is header at row 1)
            updates.push({ range: `${TX_TAB}!G${i + 1}`, values: [[rule.split]] });
            added++;
          }
        }
      }
    }

    if (!added) {
      toast(`추가할 행 없음 (기존 유지: ${skipped}건)`, skipped > 0 ? 'success' : 'error');
      return;
    }

    toast(`${added}개 행에 마커 쓰는 중...`);
    const token = await getAccessToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values:batchUpdate`;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data: updates }),
    });
    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      throw new Error(`BatchUpdate ${resp.status}: ${errText.slice(0, 200)}`);
    }

    toast(`✓ ${added}개 마커 추가 완료 (기존 유지: ${skipped}). 거래내역 다시 로드 중...`, 'success');
    await refreshTransactions();
  } catch (e) {
    toast('실패: ' + e.message, 'error');
  }
}

async function refreshTransactions() {
  if (!isConfigured()) { toast('설정에서 JSON과 Sheet ID를 입력하세요', 'error'); switchTab('settings'); return; }
  try {
    toast('거래내역 로딩 중...');
    state.transactions = await loadTransactions();
    state.names = await loadNames();
    const cfg = await loadConfig();
    if (cfg.initial_cash) state.initialCash = Number(cfg.initial_cash) || state.initialCash;
    saveLocal();
    toast(`${state.transactions.length}건 로드됨`, 'success');
    if (state.currentTab === 'overview') renderOverview();
    if (state.currentTab === 'history') renderHistory();
    if (state.currentTab === 'input') renderInput();
    if (state.currentTab === 'settings') renderSettings();
  } catch (e) {
    toast('로딩 실패: ' + e.message, 'error');
  }
}

async function refreshPrices() {
  const holds = computeHoldings(state.transactions);
  const codes = Object.keys(holds).filter(c => holds[c].qty > 0);
  if (!codes.length) { toast('보유 종목 없음'); return; }
  toast(`시세 조회 중... (${codes.length}종목)`);
  const { results, failed } = await fetchAllPrices(codes);
  state.prices = { ...state.prices, ...results };
  if (Object.keys(results).length > 0) state.lastPriceFetchAt = Date.now();
  saveLocal();
  updateHeaderInfo();
  if (failed.length) toast(`${Object.keys(results).length}종목 완료, ${failed.length}종목 실패`, 'error');
  else toast(`${Object.keys(results).length}종목 시세 갱신`, 'success');
  if (state.currentTab === 'overview') renderOverview();
  if (state.currentTab === 'settings') renderSettings();
}

async function refreshAll() {
  if (!isConfigured()) { toast('설정에서 JSON과 Sheet ID를 입력하세요', 'error'); switchTab('settings'); return; }
  await refreshTransactions();
  await refreshPrices();
}

function clearCache() {
  if (!confirm('로컬 캐시를 모두 삭제하시겠습니까? (Sheet 데이터는 영향 없음)')) return;
  localStorage.removeItem(STORAGE_KEY);
  state.transactions = []; state.prices = {}; state.names = {}; state.codeMarket = {};
  state.accessToken = null; state.tokenExpiry = 0;
  state.saKey = null; state.saKeyRaw = ''; state.sheetId = ''; state.initialCash = 0;
  updateConnStatus(false);
  toast('캐시 삭제됨', 'success');
  switchTab('settings');
}

// ============ HELPERS ============
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ============ INIT ============
loadLocal();
window.addEventListener('load', () => {
  switchTab('overview');
  updateConnStatus(false);
  updateHeaderInfo();
  // Auto-load on startup if configured
  if (isConfigured() && state.transactions.length > 0) {
    // We have cached data — just refresh prices in background
    setTimeout(() => refreshPrices().catch(() => {}), 500);
  } else if (isConfigured()) {
    setTimeout(() => refreshAll().catch(() => {}), 500);
  }
});
</script>
