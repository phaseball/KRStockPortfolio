function drawTickerChart(code) {
  const canvas = document.getElementById('tickerChartCanvas');
  if (!canvas) return;
  if (_tickerChartInstance) { _tickerChartInstance.destroy(); _tickerChartInstance = null; }

  const fullSeries = computeTickerTimeSeries(code);
  const placeholder = document.getElementById('tickerChartPlaceholder');
  if (!fullSeries || !fullSeries.dates.length) {
    if (placeholder) placeholder.textContent = _cachedDaily ? '데이터 없음' : 'daily_value_kr 로딩 중...';
    // If daily cache isn't loaded yet, trigger load + retry
    if (!_cachedDaily && !_dailyLoadingPromise && isConfigured()) {
      _dailyLoadingPromise = loadDailyValues().then(d => {
        _cachedDaily = d;
        _dailyLoadingPromise = null;
        if (state.selectedCode === code) drawTickerChart(code);
      }).catch(() => { _dailyLoadingPromise = null; });
    }
    return;
  }
  if (placeholder) placeholder.style.display = 'none';

  // Apply period filter (same options/logic as total value chart's filterByPeriod)
  const period = state.tickerChartPeriod || '2026';
  let keepIdx;
  if (period === 'total') {
    keepIdx = fullSeries.dates.map((_, i) => i);
  } else if (period.match(/^\d{4}$/)) {
    const start = `${period}-01-01`, end = `${period}-12-31`;
    keepIdx = fullSeries.dates
      .map((d, i) => [d, i])
      .filter(([d]) => d >= start && d <= end)
      .map(([, i]) => i);
  } else {
    // 1y / 6m / 3m: KST-anchored cutoff using UTC arithmetic
    const todayKST = getKoreanToday();
    const [yy, mm0, dd0] = todayKST.split('-').map(Number);
    const cutD = new Date(Date.UTC(yy, mm0 - 1, dd0));
    if (period === '1y') cutD.setUTCFullYear(cutD.getUTCFullYear() - 1);
    else if (period === '6m') cutD.setUTCMonth(cutD.getUTCMonth() - 6);
    else if (period === '3m') cutD.setUTCMonth(cutD.getUTCMonth() - 3);
    const cutoff = cutD.toISOString().slice(0, 10);
    keepIdx = fullSeries.dates
      .map((d, i) => [d, i])
      .filter(([d]) => d >= cutoff)
      .map(([, i]) => i);
  }
  if (!keepIdx.length) {
    if (placeholder) { placeholder.style.display = 'flex'; placeholder.textContent = '선택한 기간에 데이터 없음'; }
    return;
  }
  const pick = (arr) => keepIdx.map(i => arr[i]);
  const series = {
    dates: pick(fullSeries.dates),
    cost: pick(fullSeries.cost),
    marketValue: pick(fullSeries.marketValue),
    unrealizedPL: pick(fullSeries.unrealizedPL),
    realizedPL: pick(fullSeries.realizedPL),
    totalPL: pick(fullSeries.totalPL),
    price: pick(fullSeries.price),
  };

  const ctx = canvas.getContext('2d');
  // Y-axis tick formatter: 만 unit
  const fmtMan = v => {
    if (v == null) return '';
    const m = v / 10000;
    if (Math.abs(m) >= 10000) return (m / 10000).toFixed(1) + '억';
    if (Math.abs(m) >= 1) return Math.round(m).toLocaleString() + '만';
    return Math.round(v).toLocaleString();
  };

  _tickerChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: series.dates,
      datasets: [
        { label: '매수',     data: series.cost,         borderColor: '#9ca3af', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, yAxisID: 'y' },
        { label: '평가',     data: series.marketValue,  borderColor: '#06b6d4', backgroundColor: 'transparent', borderWidth: 2,                       pointRadius: 0, yAxisID: 'y' },
        { label: '평가손익', data: series.unrealizedPL, borderColor: '#10b981', backgroundColor: 'transparent', borderWidth: 1.5,                     pointRadius: 0, yAxisID: 'y' },
        { label: '실현손익', data: series.realizedPL,   borderColor: '#f59e0b', backgroundColor: 'transparent', borderWidth: 1.5,                     pointRadius: 0, yAxisID: 'y' },
        { label: '총손익',   data: series.totalPL,      borderColor: '#84cc16', backgroundColor: 'transparent', borderWidth: 2.5,                     pointRadius: 0, yAxisID: 'y' },
        { label: '주가',     data: series.price,        borderColor: '#ec4899', backgroundColor: 'transparent', borderWidth: 1.5, borderDash: [2,2], pointRadius: 0, yAxisID: 'y1', spanGaps: true },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      layout: { padding: { right: 8 } },
      scales: {
        x: { ticks: { maxTicksLimit: 8, color: '#9ca3af', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
        y:  { position: 'left',  ticks: { callback: fmtMan, color: '#9ca3af', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.06)' } },
        y1: { position: 'right', ticks: { callback: fmtMan, color: '#ec4899', font: { size: 10 } }, grid: { drawOnChartArea: false } },
      },
      plugins: {
        legend: { position: 'top', labels: { color: '#d1d5db', font: { size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          callbacks: {
            label: (item) => {
              const v = item.parsed.y;
              if (v == null) return `${item.dataset.label}: —`;
              return `${item.dataset.label}: ${Math.round(v).toLocaleString()} 원`;
            },
          },
        },
      },
    },
  });
}

function renderTickerDetail(code) {
  const root = document.getElementById('tab-overview');
  const name = state.names[code] || code;
  const txs = state.transactions.filter(t => t.code === code);
  const holds = computeHoldings(state.transactions);
  const h = holds[code] || { qty: 0, avgCost: 0, realizedPL: 0, realizedPLThisYear: 0 };
  const priceObj = state.prices[code];
  const curPrice = priceObj ? priceObj.price : null;
  const lineCost = h.qty * h.avgCost;
  const value = curPrice && h.qty > 0 ? h.qty * curPrice : null;
  const upl = value !== null ? value - lineCost : null;
  const uplPct = curPrice && h.avgCost > 0 ? (curPrice - h.avgCost) / h.avgCost : null;
  const totalGain = (upl || 0) + (h.realizedPL || 0);

  // %1d / %1w from priceObj (uses prevClose & week1Close in state.prices)
  const d1 = priceObj && priceObj.changeRate != null ? priceObj.changeRate : null;
  const w1 = priceObj && priceObj.week1Rate != null ? priceObj.week1Rate : null;
  const priceChangesSub = (d1 != null || w1 != null)
    ? `(${d1 != null ? `<span class="${plClass(d1)}">${fmtPct(d1)}</span>` : '—'}${w1 != null ? ` / <span class="${plClass(w1)}">${fmtPct(w1)}</span>` : ''})`
    : '';

  const summary = `
    <div class="cards-grid">
      <div class="card summary-card">
        <div class="label">보유수량</div>
        <div class="value">${h.qty.toString()}주</div>
        <div class="sub">평단 ${fmtMan2(h.avgCost)}</div>
      </div>
      <div class="card summary-card">
        <div class="label">평가 / 매수</div>
        <div class="value">${value !== null ? fmtMan(value, '') : '—'}</div>
        <div class="sub">
          매수 ${fmtMan(lineCost, '')}<br>
          <span class="${plClass(upl)}">평가손익 ${upl !== null ? fmtManSigned(upl, '') : '—'}${uplPct !== null ? ` (${fmtPct(uplPct)})` : ''}</span>
        </div>
      </div>
      <div class="card summary-card">
        <div class="label">실현 YTD/total · 총수익</div>
        <div class="value ${plClass(totalGain)}">${fmtManSigned(totalGain, '')}</div>
        <div class="sub">
          <span class="${plClass(h.realizedPLThisYear)}">YTD ${fmtManSigned(h.realizedPLThisYear, '')}</span>
          <span class="text-faint"> / </span>
          <span class="${plClass(h.realizedPL)}">total ${fmtManSigned(h.realizedPL, '')}</span>
        </div>
      </div>
      <div class="card summary-card">
        <div class="label">현재가</div>
        <div class="value">${curPrice ? fmtMan2(curPrice) : '—'}</div>
        <div class="sub">${priceChangesSub || '<span class="text-faint">—</span>'}</div>
      </div>
    </div>
  `;

  // Transactions table for this code, processed in the SAME order as the holdings compute
  // (date asc, buys-first within same date, then sheet row order)
  // — this is what the running balance reflects.
  const txsForCode = state.transactions.filter(t => t.code === code);
  let runningQty = 0;
  let clampEvents = 0;
  const walked = txsForCode.map(t => {
    if (t.qty > 0) {
      runningQty += t.qty;
    } else {
      runningQty += t.qty;  // already negative
      if (runningQty < 0) clampEvents++;
      if (runningQty <= 0) runningQty = 0;  // v4 clamp
    }
    return { ...t, runningQty };
  });

  const rows = [...walked].reverse().map(t => {
    const splitBadge = t.splitRaw ? ` <span style="color:var(--warn);font-size:10px">[split ${escapeHtml(t.splitRaw)}]</span>` : '';
    const qtyCell = t.splitRaw ? `${signed(t.qty)}<br><span class="text-faint" style="font-size:10px">(원본 ${signed(t.origQty)})</span>` : signed(t.qty);
    const priceCell = t.splitRaw ? `${fmtMan3(t.price)}<br><span class="text-faint" style="font-size:10px">(원본 ${fmtMan3(t.origPrice)})</span>` : fmtMan3(t.price);
    // 평가금액: market value of position AFTER this transaction, using that day's closing price if cached, else trade price
    let valPrice = t.price;
    if (_cachedDaily && _cachedDaily.length) {
      const day = _cachedDaily.find(d => d.date === t.date);
      if (day && day.prices && day.prices[code]) valPrice = day.prices[code];
    }
    const positionValue = t.runningQty > 0 ? t.runningQty * valPrice : 0;
    const valueCell = t.runningQty > 0 ? fmtMan3(positionValue) : '<span class="text-faint">—</span>';
    return `
    <tr>
      <td>${t.date}${splitBadge}</td>
      <td class="${t.qty > 0 ? 'gain' : 'loss'}">${t.qty > 0 ? '매수' : '매도'}</td>
      <td>${qtyCell}</td>
      <td>${priceCell}</td>
      <td>${fmtMan3(t.fees)}</td>
      <td>${fmtMan3(t.settle)}</td>
      <td><b>${t.runningQty.toString()}</b></td>
      <td>${valueCell}</td>
    </tr>
  `;
  }).join('');

  // Sanity check: simple sum vs current qty
  const simpleSum = txsForCode.reduce((s, t) => s + t.qty, 0);
  const matchHint = (simpleSum === h.qty)
    ? `<span style="color:var(--text-faint)">단순합 = 현재 보유수량 = ${h.qty}</span>`
    : `<span style="color:var(--warn)">⚠️ 단순합(${simpleSum}) ≠ 보유수량(${h.qty}) — clamping ${clampEvents}회 발생</span>`;

  root.innerHTML = `
    <button class="back-btn" onclick="state.selectedCode=null;renderOverview()">← 보유 종목으로</button>
    <h2 style="font-size:18px;margin-bottom:4px">${escapeHtml(name)}</h2>
    <div style="font-size:12px;color:var(--text-faint);font-family:ui-monospace,monospace;margin-bottom:16px">${code}</div>
    ${summary}
    <div class="card" style="padding:12px;margin-bottom:12px;position:relative">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
        <h2 style="margin:0;font-size:15px">📊 종목 히스토리</h2>
        <div id="ticker-period-host">${renderTickerPeriodButtons()}</div>
      </div>
      <div style="height:340px;position:relative">
        <canvas id="tickerChartCanvas"></canvas>
        <div id="tickerChartPlaceholder" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-faint);font-size:12px;pointer-events:none"></div>
      </div>
    </div>
    <div class="card" style="padding:0">
      <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h2 style="margin:0">거래내역 (${txsForCode.length})</h2>
        <div style="font-size:11px">${matchHint}</div>
      </div>
      <div style="overflow-x:auto"><table class="history-table">
        <thead><tr><th>매매일</th><th>구분</th><th>수량</th><th>단가</th><th>수수료</th><th>정산금액</th><th>누적</th><th>평가금액</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
  `;
  // Draw the chart after the DOM is in place
  setTimeout(() => drawTickerChart(code), 0);
}

      <select id="filter-dir" onchange="applyHistoryFilter()">
        <option value="">매수+매도</option>

      </select>
      <span style="margin-left:auto;font-size:12px;color:var(--text-dim)" id="hist-count"></span>
    </div>

      <div style="overflow-x:auto">

            <th>매매일</th><th>계정</th><th>종목</th><th>구분</th><th>수량</th><th>단가</th><th>수수료</th><th>정산금액</th>
          </tr></thead>
          <tbody id="hist-body"></tbody>
        </table>

  applyHistoryFilter();
}

// History-specific broker setter: updates state & re-renders history (keeps tabs in sync with overview)
function setActiveBrokerHistory(broker) {
  state.activeBroker = broker;
  saveLocal();
  renderHistory();
}

function applyHistoryFilter() {
  const codeSel = document.getElementById('filter-code');
  const dirSel = document.getElementById('filter-dir');
  const broker = state.activeBroker || 'total';
  const code = codeSel ? codeSel.value : '';
  const dir = dirSel ? dirSel.value : '';

  let rows = [...state.transactions].reverse();
  // 'total' = all except ISA; ISA = only ISA; specific broker = filter by that broker
  if (broker === 'total') rows = rows.filter(t => t.broker !== 'ISA');
  else if (broker === 'ISA') rows = rows.filter(t => t.broker === 'ISA');
  else rows = rows.filter(t => t.broker === broker);
  if (code) rows = rows.filter(t => t.code === code);
  if (dir === 'buy') rows = rows.filter(t => t.qty > 0);
  if (dir === 'sell') rows = rows.filter(t => t.qty < 0);

  document.getElementById('hist-count').textContent = `${rows.length}건`;

  // Cap to 500 rows for performance, but still group by date with summaries
  const display = rows.slice(0, 500);
  const html = [];
  let prevDate = null;
  let buf = [];   // transactions accumulator for current date
  const flushDate = () => {
    if (!buf.length) return;
    const date = buf[0].date;
    const buys = buf.filter(t => t.qty > 0);
    const sells = buf.filter(t => t.qty < 0);
    const buyAmt = buys.reduce((s, t) => s + t.settle, 0);
    const sellAmt = sells.reduce((s, t) => s + t.settle, 0);
    const buyFees = buys.reduce((s, t) => s + t.fees, 0);
    const sellFees = sells.reduce((s, t) => s + t.fees, 0);
    const net = buyAmt - sellAmt;   // positive = net buy (red), negative = net sell (blue)
    html.push(`<tr class="day-summary">
      <td><b>${date}</b></td>
      <td colspan="7" style="font-size:11px">
        <span class="gain">매수 ${buys.length}건 ${fmtMan(buyAmt, '')}</span>
        <span class="text-faint"> · </span>
        <span class="loss">매도 ${sells.length}건 ${fmtMan(sellAmt, '')}</span>
        <span class="text-faint"> · </span>
        순 <span class="${plClass(net)}">${fmtManSigned(net, '')}</span>
        <span class="text-faint"> · </span>
        수수료 ${fmtMan3(buyFees + sellFees)}
      </td>
    </tr>`);
    for (const t of buf) {
      html.push(`<tr style="cursor:pointer" onclick="state.selectedCode='${t.code}';switchTab('overview')">
        <td></td>
        <td style="font-size:11px;color:var(--accent)">${escapeHtml((t.broker || '').replace('국내', ''))}</td>
        <td><span style="font-weight:600">${escapeHtml((state.names[t.code] || t.code).slice(0, 18))}</span> <span class="text-faint" style="font-size:11px">${t.code}</span></td>
        <td class="${t.qty > 0 ? 'gain' : 'loss'}">${t.qty > 0 ? '매수' : '매도'}</td>
        <td>${signed(t.qty)}</td>
        <td>${fmtMan2(t.price)}</td>
        <td>${fmtMan3(t.fees)}</td>
        <td>${fmtMan2(t.settle)}</td>
      </tr>`);
    }
    buf = [];
  };
  for (const t of display) {
    if (t.date !== prevDate) {
      flushDate();
      prevDate = t.date;
    }
    buf.push(t);
  }
  flushDate();
  if (rows.length > 500) html.push(`<tr><td colspan="8" style="text-align:center;color:var(--text-faint);padding:14px">… 처음 500건만 표시 (전체 ${rows.length}건)</td></tr>`);
  document.getElementById('hist-body').innerHTML = html.join('');
}

// ============ INPUT (Sheet Append) ============
// v4 format:
//   #계정명 YYMMDD              ← header sets date for following rows; can appear multiple times
//   종목명,수량,가격(만원),순번    ← data row; qty signed (+매수 / −매도)
// Looks up code from kr_names by name. Estimates fees/거래세 from KR rates (0.015% + 0.20% sell tax on stocks).
function parseInputRows(text) {
  const rows = [];
  const errors = [];
  let currentDate = null;
  let currentAccount = null;

  // Build name → code reverse lookup (case-insensitive, whitespace-stripped)
  const nameToCode = {};
  for (const [code, name] of Object.entries(state.names || {})) {
    if (!name) continue;
    const key = String(name).trim().replace(/\s+/g, '').toLowerCase();
    nameToCode[key] = code;
  }

  const lines = text.split(/\r?\n/);
  lines.forEach((rawLine, idx) => {
    const lineNum = idx + 1;
    const line = rawLine.trim();
    if (!line) return;

    // Header: #account YYMMDD (or YYYYMMDD)
    if (line.startsWith('#')) {
      const m = line.match(/^#\s*(\S+)\s+(\d{6,8})\s*$/);
      if (m) {
        currentAccount = m[1];
        const d = m[2];
        currentDate = d.length === 6
          ? `20${d.slice(0, 2)}-${d.slice(2, 4)}-${d.slice(4, 6)}`
          : `${d.slice(0, 4)}-${d.slice(4, 6)}-${d.slice(6, 8)}`;
      } else {
        errors.push(`${lineNum}행: 헤더 형식 오류 "${line}" (예: #삼성국내 260514)`);
      }
      return;
    }

    if (!currentDate) {
      errors.push(`${lineNum}행: 헤더(#계정 YYMMDD) 먼저 필요`);
      return;
    }

    const parts = line.split(',').map(p => p.trim());
    if (parts.length < 4) {
      errors.push(`${lineNum}행: 컬럼 부족 (${parts.length}개, 4개 필요: 종목명,수량,가격(만),순번)`);
      return;
    }

    const [name, qtyRaw, priceManRaw, seqRaw] = parts;
    const priceMan = parseFloat(priceManRaw);
    const qty = parseFloat(qtyRaw);

    if (!name) { errors.push(`${lineNum}행: 종목명 없음`); return; }
    if (isNaN(priceMan) || priceMan <= 0) {
      errors.push(`${lineNum}행: 가격(만원) 형식 오류 "${priceManRaw}"`); return;
    }
    if (isNaN(qty) || qty === 0) {
      errors.push(`${lineNum}행: 수량 형식 오류 "${qtyRaw}"`); return;
    }

    const nameKey = name.trim().replace(/\s+/g, '').toLowerCase();
    const code = nameToCode[nameKey];
    if (!code) {
      errors.push(`${lineNum}행: 종목명 "${name}" 코드 없음 (kr_names 탭에 등록 필요)`);
      return;
    }

    // ETF detection by Korean name prefix
    const isEtf = isEtfName(name);
    const price = Math.round(priceMan * 10000);
    const isBuy = qty > 0;
    const gross = price * Math.abs(qty);

    // Validate broker name (currentAccount from #header)
    const broker = BROKERS.includes(currentAccount) ? currentAccount : null;
    if (!broker) {
      errors.push(`${lineNum}행: 알 수 없는 계정 "${currentAccount}" (지원: ${BROKERS.join(', ')})`);
      return;
    }

    // Per-broker fee rates
    const rates = FEE_RATES_BY_BROKER[broker] || { brokerage: FEE_BROKERAGE, sellTaxStock: FEE_TAX_STOCK_SELL };
    // Brokerage applies to all (varies by platform)
    const brokerage = Math.round(gross * rates.brokerage);
    // Tax: only stock sells (KOSPI/KOSDAQ) — ETF sells are tax-exempt
    const tax = (!isBuy && !isEtf) ? Math.round(gross * rates.sellTaxStock) : 0;
    const fees = brokerage + tax;
    const settle = isBuy ? gross + fees : gross - fees;

    rows.push([broker, currentDate, code, price, qty, fees, settle, '']);
  });

  // Warn if no rows parsed at all
  if (rows.length === 0 && errors.length === 0 && text.trim()) {
    errors.push('파싱된 행 없음 - 형식을 확인하세요');
  }

  return { rows, errors };
}

              const r = FEE_RATES_BY_BROKER[b] || { brokerage: FEE_BROKERAGE, sellTaxStock: FEE_TAX_STOCK_SELL };
              const buyPct = (r.brokerage * 100).toFixed(4) + '%';
              const sellEtfPct = (r.brokerage * 100).toFixed(4) + '%';
              const sellStockPct = ((r.brokerage + r.sellTaxStock) * 100).toFixed(4) + '%';
              // Actual measured rates from transactions
              const txs = state.transactions.filter(t => t.broker === b);
              const buys = txs.filter(t => t.qty > 0);
              const sells = txs.filter(t => t.qty < 0);
              const buyGross = buys.reduce((s, t) => s + (t.price * t.qty), 0);
              const buyFee = buys.reduce((s, t) => s + (t.fee || 0), 0);
              const sellGross = sells.reduce((s, t) => s + (t.price * Math.abs(t.qty)), 0);
              const sellFee = sells.reduce((s, t) => s + (t.fee || 0), 0);
              const actualBuyPct = buyGross > 0 ? (buyFee / buyGross * 100).toFixed(4) + '%' : '—';
              const actualSellPct = sellGross > 0 ? (sellFee / sellGross * 100).toFixed(4) + '%' : '—';
              return `<tr style="border-top:1px solid var(--border)">
                <td style="padding:5px 10px;color:var(--accent);font-weight:600">${b}</td>
                <td style="text-align:right;padding:5px 10px;font-family:ui-monospace,monospace">${buyPct}</td>
                <td style="text-align:right;padding:5px 10px;font-family:ui-monospace,monospace;color:var(--accent)">${actualBuyPct} <span class="text-faint" style="font-size:10px">(${buys.length})</span></td>
                <td style="text-align:right;padding:5px 10px;font-family:ui-monospace,monospace">${sellEtfPct}</td>
                <td style="text-align:right;padding:5px 10px;font-family:ui-monospace,monospace">${sellStockPct}</td>
                <td style="text-align:right;padding:5px 10px;font-family:ui-monospace,monospace;color:var(--accent)">${actualSellPct} <span class="text-faint" style="font-size:10px">(${sells.length})</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <div style="padding:5px 10px;background:var(--bg);font-size:10px;color:var(--text-faint)">
          ※ 실측 = 거래내역 기준 가중평균. 매도 주식 = 브로커리지 + 거래세 0.20%
        </div>

      <h2>미리보기 (${parsed.rows.length}건)</h2>
      ${previewHtml}
    </div>

    ${errorsHtml}
  `;
}

function previewInput() {
  const text = document.getElementById('input-textarea').value;
  if (!text.trim()) { toast('입력 내용 없음', 'error'); return; }
  lastParsedInput = parseInputRows(text);
  const txt = document.getElementById('input-textarea').value;  // preserve
  renderInput();
  document.getElementById('input-textarea').value = txt;
  if (lastParsedInput.errors.length) {
    toast(`${lastParsedInput.rows.length}건 정상 / ${lastParsedInput.errors.length}건 오류`, lastParsedInput.errors.length === lastParsedInput.errors.length + lastParsedInput.rows.length ? 'error' : '');
  } else {
    toast(`${lastParsedInput.rows.length}건 파싱 완료`, 'success');
  }
}

function clearInputForm() {
  document.getElementById('input-textarea').value = '';
  lastParsedInput = { rows: [], errors: [] };
  renderInput();
}

async function commitInput() {
  if (!isConfigured()) { toast('연결 설정 먼저', 'error'); return; }
  if (!lastParsedInput.rows.length) { toast('미리보기 먼저 실행', 'error'); return; }

  // Group by broker (row[0]); convert numeric columns to comma-formatted strings.
  // USER_ENTERED parses "174,520" back to number 174520 AND applies matching number format,
  // so the Sheet displays the comma. parseNum on read strips commas correctly.
  const fmtNum = (v) => Number(v).toLocaleString('en-US');
  const byBroker = {};
  for (const r of lastParsedInput.rows) {
    const broker = r[0];
    if (!byBroker[broker]) byBroker[broker] = [];
    // r = [broker, date, code, price, qty, fees, settle, split]
    byBroker[broker].push([
      r[1],            // date
      r[2],            // code
      fmtNum(r[3]),    // price (with commas)
      Number(r[4]).toString(),  // qty (signed, no commas)
      fmtNum(r[5]),    // fees (with commas)
      fmtNum(r[6]),    // settle (with commas)
      r[7] || '',      // split
    ]);
  }
  const summary = Object.entries(byBroker).map(([b, rs]) => `${b}: ${rs.length}건`).join(', ');
  if (!confirm(`${lastParsedInput.rows.length}건을 시트에 추가:\n${summary}\n\n계속?`)) return;

  try {
    toast('Sheet에 추가 중...');
    for (const [broker, rs] of Object.entries(byBroker)) {
      await sheetAppend(`${broker}!A:G`, rs);
    }
    toast(`✓ ${lastParsedInput.rows.length}건 추가 완료. 거래내역 다시 로드 중...`, 'success');
    lastParsedInput = { rows: [], errors: [] };
    clearInputForm();
    await refreshTransactions();
  } catch (e) {
    toast('추가 실패: ' + e.message, 'error');
  }
}

function saveSettings() {
  const rawJson = document.getElementById('set-sa-json').value.trim();
  if (rawJson) {
    try {
      const parsed = JSON.parse(rawJson);
      if (!parsed.client_email || !parsed.private_key) {
        toast('JSON에 client_email 또는 private_key가 없습니다', 'error');
        return;
      }
      state.saKey = parsed;
      state.saKeyRaw = rawJson;
    } catch (e) {
      toast('JSON 파싱 실패: ' + e.message, 'error');
      return;
    }
  }
  state.sheetId = document.getElementById('set-sheet-id').value.trim();
  for (const b of BROKERS) {
    const el = document.getElementById('set-init-' + b);
    state.initialCashByBroker[b] = Number(el?.value) || 0;
  }
  // Reset cached token since key may have changed
  state.accessToken = null; state.tokenExpiry = 0;
  saveLocal();
  updateConnStatus(false);
  // Write per-broker initial_cash to config_kr (best-effort; ignore failures)
  if (state.sheetId && state.saKey) {
    (async () => {
      try {
        const rows = BROKERS.map(b => [`initial_cash_${b}`, state.initialCashByBroker[b] || 0]);
        // Clear existing initial_cash_* rows by overwriting A:B from row 1
        // Simpler: just write rows; existing extra rows may remain but won't conflict
        const token = await getAccessToken();
        await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${encodeURIComponent(CONFIG_TAB)}!A1?valueInputOption=USER_ENTERED`, {
          method: 'PUT',
          headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ values: rows }),
        }).catch(() => {});
      } catch (e) {}
    })();
  }
  toast('저장됨. 연결 테스트를 눌러보세요.', 'success');
  renderSettings();
}

// Recompute daily_value_kr from scratch.
// Schema: date | totalValue | cash | holdings | prices  (matches v4)
async function recalcDailyValues() {
  if (!isConfigured()) { toast('연결 설정 먼저', 'error'); return; }
  if (!state.transactions.length) { toast('거래내역 없음 — 먼저 새로고침', 'error'); return; }
  if (!confirm(`daily_value_kr 탭을 전체 재계산합니다.\n시세 API 호출에 ~30초~2분 소요. 계속?`)) return;

  try {
    // Process ALL transactions (including ISA) so the sheet's prices column has every code.
    // The 'total' view's ISA-exclusion is applied at display time (in renderOverview) by
    // subtracting ISA's yesterday value from yEntry.totalValue. This keeps the sheet schema
    // compatible with old data + makes ISA's own daily change calculable from yEntry.prices.
    // Sort with buys-first within same date (matches computeHoldings ordering)
    const sorted = [...state.transactions].sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      const aIsBuy = a.qty > 0 ? 0 : 1;
      const bIsBuy = b.qty > 0 ? 0 : 1;
      if (aIsBuy !== bIsBuy) return aIsBuy - bIsBuy;
      return a.seq - b.seq;
    });

    const fromDate = sorted[0].date;
    const today = getKoreanToday();

    // Codes ever held with positive qty
    const everHeld = new Set();
    {
      const pos = {};
      for (const tx of sorted) {
        pos[tx.code] = (pos[tx.code] || 0) + tx.qty;
        if (pos[tx.code] > 0) everHeld.add(tx.code);
      }
    }
    const codes = [...everHeld];

    // Fetch historical prices in parallel
    toast(`시세 가져오는 중... 0/${codes.length}`);
    const { result: priceHistory, failed } = await fetchAllHistorical(
      codes, fromDate, today,
      (done, total) => { toast(`시세 가져오는 중... ${done}/${total}`); }
    );

    // Collect all dates (price dates ∪ tx dates)
    const allDates = new Set();
    for (const c in priceHistory) for (const d in priceHistory[c]) allDates.add(d);
    for (const tx of sorted) allDates.add(tx.date);
    const sortedDates = [...allDates].sort();
    if (!sortedDates.length) { toast('시세 데이터 없음', 'error'); return; }

    // Group transactions by date
    const txByDate = {};
    for (const tx of sorted) {
      if (!txByDate[tx.date]) txByDate[tx.date] = [];
      txByDate[tx.date].push(tx);
    }
    const txDatesSorted = Object.keys(txByDate).sort();

    // Walk through dates, build snapshots
    toast(`스냅샷 계산 중 (${sortedDates.length}일)...`);
    const out = [['date', 'totalValue', 'cash', 'holdings', 'prices']];

    // Determine effective initial cash: max(user setting, minimum required for trades).
    // The "minimum required" = -min(cumulative_cash_flow) so cash never dips below 0.
    // Use ALL brokers' initial cash (including ISA) so the stored totalValue is
    // consistent with cumulative cash flow from ALL transactions.
    const userInitial = BROKERS.reduce((s, b) => s + (state.initialCashByBroker[b] || 0), 0);
    let cumCashFlow = 0;
    let minCum = 0;
    for (const tx of sorted) {
      if (tx.qty > 0) cumCashFlow -= tx.settle;
      else cumCashFlow += tx.settle;
      if (cumCashFlow < minCum) minCum = cumCashFlow;
    }
    const minRequired = Math.max(0, -minCum);
    let cash = Math.max(userInitial, minRequired);
    if (cash > userInitial) {
      console.log(`[daily_value] Auto-bumped initial cash from ${userInitial} to ${cash} (min required to keep cash≥0)`);
      toast(`⚠ 초기자본이 부족해 자동으로 ${fmtMan(cash)}로 보정 (설정에서 수정 권장)`, 'success');
    }
    const positions = {};
    const lastKnown = {};  // forward-fill last observed price per code
    let txIdx = 0;

    for (const date of sortedDates) {
      // Apply all txs with date <= snapshot date
      while (txIdx < txDatesSorted.length && txDatesSorted[txIdx] <= date) {
        for (const tx of txByDate[txDatesSorted[txIdx]]) {
          positions[tx.code] = (positions[tx.code] || 0) + tx.qty;
          if (positions[tx.code] <= 0) positions[tx.code] = 0;
          if (tx.qty > 0) cash -= tx.settle;
          else cash += tx.settle;
        }
        txIdx++;
      }

      // EOD snapshot
      const holdings = {};
      const prices = {};
      let marketValue = 0;
      for (const code in positions) {
        if (positions[code] <= 0) continue;
        let p = priceHistory[code]?.[date];
        if (p) lastKnown[code] = p;
        else p = lastKnown[code];
        if (p) {
          prices[code] = p;
          const v = positions[code] * p;
          holdings[code] = Math.round(v);
          marketValue += v;
        }
      }

      out.push([
        date,
        Math.round(cash + marketValue),
        Math.round(cash),
        JSON.stringify(holdings),
        JSON.stringify(prices),
      ]);
    }

    // Write to Sheet (clear + put)
    toast(`${out.length - 1}일 시트에 저장 중...`);
    const token = await getAccessToken();
    try { await sheetCreate(DAILY_TAB); } catch (e) {}
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${encodeURIComponent(DAILY_TAB)}!A:E:clear`, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: '{}',
    });
    const writeResp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${encodeURIComponent(DAILY_TAB)}!A1?valueInputOption=USER_ENTERED`, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ range: `${DAILY_TAB}!A1`, values: out }),
    });
    if (!writeResp.ok) {
      const t = await writeResp.text().catch(() => '');
      throw new Error(`Sheet write ${writeResp.status}: ${t.slice(0, 200)}`);
    }

    const last = out[out.length - 1];
    const failedNote = failed.length ? ` (시세 실패 ${failed.length}종목)` : '';
    toast(`✓ ${out.length - 1}일 저장. 최종 총자산 ${fmtMan(last[1])}${failedNote}`, 'success');
    if (failed.length) console.warn('Codes without price history:', failed);
  } catch (e) {
    toast('실패: ' + e.message, 'error');
    console.error(e);
  }
}

// Write split marks to column G in the Sheet. Skips rows that already have a value.
async function applySplitMarkers() {
  if (!isConfigured()) { toast('먼저 JSON과 Sheet ID를 저장하세요', 'error'); return; }
  const desc = SPLIT_MARKERS.map(r => `• ${r.code} (${r.name || ''}): ${r.before} 이전 → ${r.split}`).join('\n');
  if (!confirm(`다음 분할 마커를 ${TX_TAB} 시트 G열에 추가합니다:\n\n${desc}\n\n기존 G열 값이 있는 행은 건너뜁니다.\n계속하시겠습니까?`)) return;
  try {
    toast('시트 읽는 중...');
    const updates = [];
    let added = 0, skipped = 0;
    for (const broker of BROKERS) {
      let rows;
      try { rows = await sheetGet(`${broker}!A:G`); }
      catch (e) { continue; }
      if (!rows || rows.length < 2) continue;
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r[0]) continue;
        const rowDate = parseDate(r[0]);
        const rowCode = String(r[1] || '').trim();
        const existing = r[6] !== undefined && r[6] !== null && String(r[6]).trim() !== '';
        for (const rule of SPLIT_MARKERS) {
          if (rowCode === rule.code && rowDate < rule.before) {
            if (existing) { skipped++; }
            else {
              updates.push({ range: `${broker}!G${i + 1}`, values: [[rule.split]] });
              added++;
            }
          }
        }
      }
    }

    if (!added) {
      toast(`추가할 행 없음 (기존 유지: ${skipped}건)`, skipped > 0 ? 'success' : 'error');
      return;
    }

    toast(`${added}개 행에 마커 쓰는 중...`);
    const token = await getAccessToken();
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values:batchUpdate`;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data: updates }),
    });
    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      throw new Error(`BatchUpdate ${resp.status}: ${errText.slice(0, 200)}`);
    }

    toast(`✓ ${added}개 마커 추가 완료 (기존 유지: ${skipped}). 거래내역 다시 로드 중...`, 'success');
    await refreshTransactions();
  } catch (e) {
    toast('실패: ' + e.message, 'error');
  }
}

async function refreshTransactions() {
  if (!isConfigured()) { toast('설정에서 JSON과 Sheet ID를 입력하세요', 'error'); switchTab('settings'); return; }
  try {
    toast('거래내역 로딩 중...');
    state.transactions = await loadTransactions();
    _cachedDaily = null;   // invalidate chart cache; will reload on next chart open
    state.names = await loadNames();
    const cfg = await loadConfig();
    // Per-broker initial cash from config_kr (with legacy fallback to flat initial_cash)
    for (const b of BROKERS) {
      const v = cfg['initial_cash_' + b];
      if (v !== undefined && v !== null && v !== '') {
        state.initialCashByBroker[b] = Number(v) || 0;
      }
    }
    if (cfg.initial_cash && !state.initialCashByBroker['삼성국내']) {
      state.initialCashByBroker['삼성국내'] = Number(cfg.initial_cash) || 0;
    }
    saveLocal();
    toast(`${state.transactions.length}건 로드됨`, 'success');
    if (state.currentTab === 'overview') renderOverview();
    if (state.currentTab === 'history') renderHistory();
    if (state.currentTab === 'input') renderInput();
    if (state.currentTab === 'settings') renderSettings();
  } catch (e) {
    toast('로딩 실패: ' + e.message, 'error');
  }
}

async function refreshPrices() {
  const holds = computeHoldings(state.transactions);
  const codes = Object.keys(holds).filter(c => holds[c].qty > 0);
  if (!codes.length) { toast('보유 종목 없음'); return; }
  toast(`시세 조회 중... (${codes.length}종목)`);
  const { results, failed } = await fetchAllPrices(codes);
  state.prices = { ...state.prices, ...results };
  if (Object.keys(results).length > 0) state.lastPriceFetchAt = Date.now();
  saveLocal();
  updateHeaderInfo();
  if (failed.length) toast(`${Object.keys(results).length}종목 완료, ${failed.length}종목 실패`, 'error');
  else toast(`${Object.keys(results).length}종목 시세 갱신`, 'success');
  if (state.currentTab === 'overview') renderOverview();
  if (state.currentTab === 'settings') renderSettings();
  // Sync today's daily_value_kr row in the background (US_v4 style) so the cards and the
  // value-history chart both pull from the same single source of truth — no more divergence
  // between 개요 and Value History plot. Skips itself on weekends or stale prices.
  syncTodaysDailyValue().catch(e => console.warn('post-fetch sync skipped:', e));
}

async function refreshAll() {
  if (!isConfigured()) { toast('설정에서 JSON과 Sheet ID를 입력하세요', 'error'); switchTab('settings'); return; }
  await refreshTransactions();
  // Load _cachedDaily BEFORE rendering so daily-change badges have yesterday's
  // totalValue from the sheet (the source of truth) on the very first render.
  // Without this, the first render shows "총수익 daily change = full value"
  // because yesterdayValues.totalGain falls back to 0.
  if (!_cachedDaily) {
    try { _cachedDaily = await loadDailyValues(); }
    catch (e) { console.warn('Initial daily-cache load failed:', e); }
  }
  await refreshPrices();
  // Auto-calculate daily values from last stored date to today (may write new rows + re-render)
  await autoCalcDailyValues();
}

// Add 1 day to a "YYYY-MM-DD" string (timezone-safe — no Date object math)
function addOneDay(yyyymmdd) {
  // Parse as UTC midnight to avoid local-timezone shifts, then advance 1 day in UTC
  const d = new Date(yyyymmdd + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + 1);
  return d.toISOString().slice(0, 10);
}

// Returns true if `yyyymmdd` is Mon-Fri (KST). Doesn't account for Korean holidays
// — those just produce a no-op no-new-prices day, harmless.
function isTradingDayKST(yyyymmdd) {
  const d = new Date(yyyymmdd + 'T00:00:00Z'); // UTC midnight, day-of-week is locale-free
  const dow = d.getUTCDay();
  return dow !== 0 && dow !== 6;
}

// Sync today's `daily_value_kr` row with current live state. Called after every successful
// price fetch. Writes one row (today's), updates if it already exists, appends otherwise.
// Skips writing if:
//   - today is not a trading day (Sat/Sun) — keeps prevEntry as Friday's close
//   - prices are stale (lastPriceFetchAt is not from today KST) — avoids 0 daily changes
async function syncTodaysDailyValue() {
  try {
    if (!isConfigured()) return;
    if (!state.lastPriceFetchAt) return;
    const todayKST = getKoreanToday();
    if (!isTradingDayKST(todayKST)) {
      console.log(`syncTodaysDailyValue: ${todayKST} is not a trading day, skipping`);
      return;
    }
    const fetchDateKST = getKoreanDate(new Date(state.lastPriceFetchAt));
    if (fetchDateKST !== todayKST) {
      console.log(`syncTodaysDailyValue: prices from ${fetchDateKST}, not today (${todayKST}), skipping`);
      return;
    }

    // Build today's row from current state: positions × current prices, all brokers (incl. ISA)
    const txsToday = state.transactions.filter(t => t.date <= todayKST);
    const holds = computeHoldings(txsToday);
    let totalValue = 0, totalCash = 0;
    for (const broker of BROKERS) {
      const brokerTxs = txsToday.filter(t => t.broker === broker);
      const initialCash = state.initialCashByBroker[broker] || 0;
      const sum = computeSummary(brokerTxs, holds, state.prices, initialCash);
      totalValue += sum.totalAsset;
      totalCash  += sum.cash;
    }
    const holdingsMap = {};
    const pricesMap = {};
    for (const code in holds) {
      if (holds[code].qty <= 0) continue;
      const p = state.prices[code] ? state.prices[code].price : null;
      if (p == null) continue;
      holdingsMap[code] = Math.round(holds[code].qty * p);
      pricesMap[code] = p;
    }
    const todayRow = [
      todayKST,
      Math.round(totalValue),
      Math.round(totalCash),
      JSON.stringify(holdingsMap),
      JSON.stringify(pricesMap),
    ];

    // Find today's row in sheet (update if exists, else append)
    const rows = await sheetGet(`${DAILY_TAB}!A:E`);
    let todayRowIdx = -1;     // 0-based index into `rows`
    let lastDataIdx = -1;
    if (rows && rows.length >= 2) {
      for (let i = 1; i < rows.length; i++) {
        if (!rows[i] || !rows[i][0]) continue;
        if (parseDate(rows[i][0]) === todayKST) todayRowIdx = i;
        lastDataIdx = i;
      }
    }
    const sheetRow1Based = (todayRowIdx >= 0) ? (todayRowIdx + 1) : (lastDataIdx + 2);
    const range = `${DAILY_TAB}!A${sheetRow1Based}:E${sheetRow1Based}`;

    const token = await getAccessToken();
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${state.sheetId}/values/${range}?valueInputOption=USER_ENTERED`, {
      method: 'PUT',
      headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [todayRow] }),
    });
    console.log(`syncTodaysDailyValue: ${todayRowIdx >= 0 ? 'updated' : 'appended'} ${todayKST} (totalValue=${Math.round(totalValue).toLocaleString()})`);

    // Refresh cache + re-render so cards use the latest row immediately
    _cachedDaily = null;
    try {
      _cachedDaily = await loadDailyValues();
      if (state.currentTab === 'overview' && !state.selectedCode && !state.showTotalChart) {
        renderOverview();
      } else if (state.currentTab === 'overview' && state.showTotalChart) {
        if (typeof drawTotalChart === 'function') drawTotalChart();
      }
    } catch (e) {
      console.warn('syncTodaysDailyValue: cache reload failed', e);
    }
  } catch (e) {
    console.warn('syncTodaysDailyValue failed:', e);
  }
}

// Legacy alias — old callers still reference autoCalcDailyValues
async function autoCalcDailyValues() { return syncTodaysDailyValue(); }

function clearCache() {
  if (!confirm('로컬 캐시를 모두 삭제하시겠습니까? (Sheet 데이터는 영향 없음)')) return;
  localStorage.removeItem(STORAGE_KEY);
  state.transactions = []; state.prices = {}; state.names = {}; state.codeMarket = {};
  state.accessToken = null; state.tokenExpiry = 0;
  state.saKey = null; state.saKeyRaw = ''; state.sheetId = '';
  state.initialCashByBroker = { '삼성국내': 0, '키움국내': 0, '메리츠국내': 0 };
  updateConnStatus(false);
  toast('캐시 삭제됨', 'success');
  switchTab('settings');
}

// ============ HELPERS ============
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

// ============ INIT ============
loadLocal();
window.addEventListener('load', () => {
  switchTab('overview');
  updateConnStatus(false);
  updateHeaderInfo();
  // Auto-load on startup if configured
  if (isConfigured() && state.transactions.length > 0) {
    // We have cached transactions — but still need to load _cachedDaily BEFORE rendering
    // so daily-change badges show correct yesterday values on the first render.
    setTimeout(async () => {
      try {
        if (!_cachedDaily) {
          _cachedDaily = await loadDailyValues();
          // Re-render now that yesterday data is available (before prices come in)
          if (state.currentTab === 'overview' && !state.selectedCode && !state.showTotalChart) {
            renderOverview();
          }
        }
        await refreshPrices();
        await autoCalcDailyValues();
      } catch (e) { console.warn('Startup load failed:', e); }
    }, 500);
  } else if (isConfigured()) {
    setTimeout(() => refreshAll().catch(() => {}), 500);
  }
});
</script>
