<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국내주식 포트폴리오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.9.0/jsrsasign-all-min.js"></script>
<style>
  :root {
    --bg: #0e1014;
    --bg-elev: #16191f;
    --bg-card: #1c2028;
    --border: #2a2f3a;
    --text: #e8eaed;
    --text-dim: #9aa0a6;
    --text-faint: #5f6368;
    --accent: #4f9cf9;
    --gain: #ef4444;
    --loss: #3b82f6;
    --warn: #ffb74d;
    --shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  body { padding-bottom: 80px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
  h1 { font-size: 18px; font-weight: 600; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
  .text-dim { color: var(--text-dim); }
  .text-faint { color: var(--text-faint); }
  .gain { color: var(--gain); }
  .loss { color: var(--loss); }
  .accent { color: var(--accent); }

  /* Header */
  .header {
    background: var(--bg-elev); border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 50;
  }
  .header-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .header-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 8px 12px; cursor: pointer; font-size: 13px;
    display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--border); }
  .icon-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .icon-btn.primary:hover { filter: brightness(1.1); }
  .icon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Nav tabs */
  .nav {
    display: flex; gap: 4px; padding: 12px 16px; background: var(--bg-elev);
    border-bottom: 1px solid var(--border); overflow-x: auto;
  }
  .nav-btn {
    background: transparent; border: 0; color: var(--text-dim); padding: 8px 14px;
    font-size: 14px; cursor: pointer; border-radius: 8px; white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--text); background: var(--bg-card); }
  .nav-btn.active { color: var(--text); background: var(--bg-card); font-weight: 600; }

  /* Cards */
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; box-shadow: var(--shadow);
  }
  .cards-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 16px;
  }
  .summary-card { padding: 12px 14px; min-width: 0; }
  .summary-card .label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .summary-card .value { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
  .summary-card .sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-family: ui-monospace, monospace; }
  /* meta lines (평가/매수, 자산/초기): stacked below value, brighter and slightly larger */
  .summary-card .row2 { display: block; margin-top: 4px; }
  .summary-card .row2 .meta { font-size: 12px; color: var(--text-dim); font-family: ui-monospace, monospace; line-height: 1.6; margin-top: 6px; text-align: left; }
  .summary-card .pair { display: flex; gap: 14px; align-items: baseline; margin-top: 6px; flex-wrap: wrap; }
  .summary-card .pair .item .lbl { font-size: 11px; color: var(--text-dim); }
  .summary-card .pair .item .v { font-size: 16px; font-weight: 700; white-space: nowrap; }
  .change-badge { font-size: 11px; font-weight: 500; margin-left: 6px; vertical-align: baseline; }

  /* Broker switcher (4 sub-tabs in 개요) */
  .broker-tabs { display: flex; gap: 2px; margin-bottom: 14px; border-bottom: 1px solid var(--border); align-items: stretch; }
  .broker-tab-gap { width: 14px; flex-shrink: 0; }
  .broker-tab {
    padding: 8px 14px; background: transparent; border: 0; border-bottom: 2px solid transparent;
    color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.15s;
  }
  .broker-tab:hover { color: var(--text); }
  .broker-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

  /* History table: day summary separator rows */
  .day-summary { background: rgba(255,255,255,0.04); }
  .day-summary td { padding: 5px 8px !important; border-top: 1px solid var(--border); }

  /* Holdings header + row: 6 columns × 2 rows */
  .hold-hdr {
    display: grid;
    grid-template-columns: 1.6fr 1.1fr 1.1fr 1.1fr 0.7fr 1.2fr;
    gap: 4px; padding: 6px 10px; font-size: 10px; color: var(--text-faint);
    border-bottom: 1px solid var(--border);
    background: var(--bg); position: sticky; top: 0; z-index: 1;
  }
  .holding-row {
    display: grid;
    grid-template-columns: 1.6fr 1.1fr 1.1fr 1.1fr 0.7fr 1.2fr;
    gap: 4px; padding: 9px 10px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; align-items: center;
  }
  .holding-row:hover { background: rgba(255,255,255,0.02); }
  .holding-row:last-child { border-bottom: 0; }
  .hold-cell { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .hold-cell .top { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hold-cell .bot { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* Price cell: 현재가 medium weight; 평단 same style as 매수금액 (.bot — 11px, text-dim) */
  .hold-cell-price .price-now { font-size: 13px; font-weight: 500; white-space: nowrap; }
  .hold-cell-price .price-now .changes { font-size: 11px; font-weight: 400; }
  .hold-cell-price .price-avg { font-size: 11px; color: var(--text-dim); white-space: nowrap; margin-top: 2px; }
  .holding-name { font-weight: 600; font-size: 14px; }
  .holding-code { font-size: 11px; color: var(--text-faint); font-family: ui-monospace, monospace; }
  /* Weight bar (비중 column) */
  .hold-bar { width: 100%; height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; margin-top: 3px; }
  .hold-bar > div { height: 100%; background: var(--accent); border-radius: 2px; }

  /* History table */
  .history-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .history-table th, .history-table td {
    padding: 3px 8px; text-align: right; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .history-table th {
    color: var(--text-dim); font-weight: 500; font-size: 11px;
    padding: 6px 8px;
    background: var(--bg-elev); position: sticky; top: 0;
  }
  .history-table th:first-child, .history-table td:first-child { text-align: left; }
  .history-table th:nth-child(2), .history-table td:nth-child(2) { text-align: left; }
  .history-table tbody tr:hover { background: rgba(255,255,255,0.02); }

  /* Inputs */
  input[type="text"], input[type="number"], input[type="password"] {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 8px 10px; font-size: 14px; width: 100%;
    font-family: inherit;
  }
  input:focus { outline: 0; border-color: var(--accent); }
  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
  .field { margin-bottom: 12px; }

  /* Toast */
  #toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; box-shadow: var(--shadow); display: none; z-index: 100;
    max-width: 90%;
  }
  #toast.show { display: block; }
  #toast.error { border-color: var(--loss); color: var(--loss); }
  #toast.success { border-color: var(--gain); color: var(--gain); }

  /* Empty state */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty .emoji { font-size: 32px; margin-bottom: 8px; }

  /* Filter bar */
  .filter-bar {
    display: flex; gap: 8px; padding: 10px 0; flex-wrap: wrap; align-items: center;
  }
  .filter-bar select, .filter-bar input {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 6px 10px; font-size: 13px;
    font-family: inherit;
  }

  /* Ticker history view */
  .back-btn { background: transparent; border: 0; color: var(--accent); cursor: pointer; font-size: 14px; margin-bottom: 12px; padding: 4px 0; }
  .back-btn:hover { text-decoration: underline; }

  @media (max-width: 900px) {
    .cards-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .summary-card .value { font-size: 17px; }
    .cards-grid { grid-template-columns: 1fr; }
    .hold-hdr { display: none; }
    .holding-row { grid-template-columns: 1fr 1fr; row-gap: 4px; }
    .hold-cell .top { font-size: 12px; }
    .hold-cell .bot { font-size: 10px; }
    .history-table { font-size: 12px; }
    .history-table th, .history-table td { padding: 8px 4px; }
  }
  /* Chart controls (총자산 히스토리 차트 페이지) */
  .chart-controls { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; align-items: center; }
  .chart-controls > div { display: flex; align-items: center; gap: 4px; }
  .chart-controls .lbl { color: var(--text-dim); margin-right: 4px; }
  .cbtn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); cursor: pointer; padding: 4px 10px;
    font-size: 11px; font-weight: 500; border-radius: 4px;
    transition: all 0.15s;
  }
  .cbtn:hover { color: var(--text); border-color: var(--text-dim); }
  .cbtn.on { background: var(--accent); color: white; border-color: var(--accent); }
  .chart-bench-label { display: inline-flex; align-items: center; gap: 4px; color: var(--text-dim); cursor: pointer; user-select: none; }
  .chart-bench-label input { margin: 0; cursor: pointer; }
  .chart-canvas-wrap { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
</head>
<body>

<div class="header">
  <div style="flex:1;min-width:0">
    <div class="header-title">📈 국내주식 포트폴리오 <span style="font-size:10px;color:#888;font-weight:400">v3.0</span></div>
    <div style="font-size:11px;color:var(--text-dim);margin-top:2px;font-family:ui-monospace,monospace">
      <span id="verInfo">html-—</span> · <span id="priceInfo">시세-—</span>
    </div>
  </div>
  <div class="header-actions">
    <span id="conn-status" style="font-size:12px;color:var(--text-dim);margin-right:4px">⚪ 미연결</span>
    <button class="icon-btn primary" id="refresh-btn" onclick="refreshAll()">🔄</button>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" data-tab="overview" onclick="switchTab('overview')">📊 개요</button>
  <button class="nav-btn" data-tab="history" onclick="switchTab('history')">📜 거래내역</button>
  <button class="nav-btn" data-tab="input" onclick="switchTab('input')">📝 입력</button>
  <button class="nav-btn" data-tab="settings" onclick="switchTab('settings')">⚙️ 설정</button>
</div>

<div class="container">
  <div id="tab-overview" class="tab-content"></div>
  <div id="tab-history" class="tab-content" style="display:none"></div>
  <div id="tab-input" class="tab-content" style="display:none"></div>
  <div id="tab-settings" class="tab-content" style="display:none"></div>
</div>

<div id="toast"></div>

<script>
// ============ CONFIG ============
const STORAGE_KEY = 'kr_tracker_v1';
const BROKERS = ['삼성국내', '키움국내', '메리츠국내', 'ISA'];
const TX_TAB = BROKERS[0];   // default/legacy
const NAMES_TAB = 'kr_names';
const CONFIG_TAB = 'config_kr';
const DAILY_TAB = 'daily_value_kr';
// Build timestamp comes from document.lastModified (HTTP Last-Modified or file mtime).
// No manual constant — getBuildTime() reads it dynamically at render.

// KR brokerage fee model — observed per platform from actual data
//   매수/매도 브로커리지: varies by platform (0% for 메리츠, 0.015% otherwise)
//   ETF: 브로커리지만 (거래세/농특세 비과세)
//   주식 매도: + 거래세 0.20% (regardless of platform — government tax)
const FEE_RATES_BY_BROKER = {
  '삼성국내': { brokerage: 0.00015, sellTaxStock: 0.00200 },
  '키움국내': { brokerage: 0.00015, sellTaxStock: 0.00200 },
  'ISA':      { brokerage: 0.00015, sellTaxStock: 0.00200 },
  '메리츠국내': { brokerage: 0,       sellTaxStock: 0.00200 },
};
// Backward-compat constants (default = Samsung rates)
const FEE_BROKERAGE = 0.00015;       // 0.0150%
const FEE_TAX_STOCK_SELL = 0.00200;  // 0.20% (only stocks, only on sells)
const ETF_PREFIXES = ['KODEX', 'TIGER', 'KBSTAR', 'ACE', 'KOSEF', 'ARIRANG', 'SOL', 'HANARO', 'PLUS', 'RISE', 'TIMEFOLIO', 'WOORI', 'TIMEFOLIO', 'TIME'];
function isEtfName(name) {
  if (!name) return false;
  const s = String(name).toUpperCase().replace(/\s+/g, '');
  return ETF_PREFIXES.some(p => s.startsWith(p));
}

// Known KR stock splits — applied automatically via 설정 → "분할 마커 자동 추가"
const SPLIT_MARKERS = [
  { code: 'A010120', name: 'LS일렉트릭', before: '2026-04-13', split: '1/5' },
];

// ============ STATE ============
let state = {
  saKey: null,         // parsed Service Account JSON
  saKeyRaw: '',        // raw JSON string for re-display
  sheetId: '',
  initialCashByBroker: { '삼성국내': 0, '키움국내': 0, 'ISA': 0, '메리츠국내': 0 },
  accessToken: null,
  tokenExpiry: 0,
  transactions: [],    // ALL brokers combined; each tx has .broker tag
  names: {},
  prices: {},
  codeMarket: {},      // code → '.KS' or '.KQ' (cached after first fetch)
  lastPriceFetchAt: 0, // epoch ms of last successful price fetch
  activeBroker: '삼성국내',  // 'total' or one of BROKERS
  selectedCode: null,
  showTotalChart: false,
  chartPeriod: '2026',  // 'total' | '1y' | '6m' | '3m' | '2025' | '2026'
  tickerChartPeriod: '2026',  // same options, separate selection for ticker detail chart
  chartScale: 'log',     // 'log' | 'linear'
  chartBenches: { '^KS11': true, '091160.KS': true, '^KQ11': true },  // KOSPI / KODEX반도체 / KOSDAQ
  currentTab: 'overview',
};

// Comparison index/ETF tickers for total value chart (Yahoo symbols)
const BENCH_TICKERS = [
  { code: '091160.KS', name: 'KODEX반도체',  color: '#66bb6a' },  // light green (v4 SOXX)
  { code: '^KS11',     name: 'KOSPI',       color: '#9ca3af' },  // gray
  { code: '^KQ11',     name: 'KOSDAQ',      color: '#f59e0b' },  // orange
];

// In-memory caches for chart (not persisted)
let _cachedDaily = null;
let _dailyLoadingPromise = null;
let _cachedBench = {};   // code → { 'YYYY-MM-DD': close }
let _chartInstance = null;

function saveLocal() {
  const persist = {
    saKeyRaw: state.saKeyRaw,
    sheetId: state.sheetId,
    initialCashByBroker: state.initialCashByBroker,
    transactions: state.transactions,
    names: state.names, prices: state.prices,
    codeMarket: state.codeMarket,
    lastPriceFetchAt: state.lastPriceFetchAt,
    activeBroker: state.activeBroker,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(persist)); } catch (e) {}
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      Object.assign(state, p);
      if (state.saKeyRaw) {
        try { state.saKey = JSON.parse(state.saKeyRaw); } catch (e) {}
      }
      // Migrate legacy state.initialCash → state.initialCashByBroker['삼성국내']
      if (p.initialCash && !p.initialCashByBroker) {
        state.initialCashByBroker = { '삼성국내': p.initialCash, '키움국내': 0, 'ISA': 0, '메리츠국내': 0 };
      }
      // Ensure all broker keys exist
      for (const b of BROKERS) {
        if (state.initialCashByBroker[b] == null) state.initialCashByBroker[b] = 0;
      }
    }
  } catch (e) {}
}

// Per-broker helpers
// 'total' = aggregate of NON-ISA brokers (ISA is a tax-favored account and shown separately
// after 전체). To still see ISA, switch to the ISA tab.
function getTxsForBroker(broker) {
  if (broker === 'total') return state.transactions.filter(t => t.broker !== 'ISA');
  return state.transactions.filter(t => t.broker === broker);
}
function getInitialCashForBroker(broker) {
  if (broker === 'total') {
    return BROKERS.filter(b => b !== 'ISA').reduce((s, b) => s + (state.initialCashByBroker[b] || 0), 0);
  }
  return state.initialCashByBroker[broker] || 0;
}

// ============ UTILS ============
// Korean timezone (UTC+9) date helpers
function getKoreanDate(date = new Date()) {
  // Convert to Korean timezone (UTC+9)
  const utc = date.getTime() + date.getTimezoneOffset() * 60000;
  const kst = new Date(utc + 9 * 3600000);
  return kst.toISOString().slice(0, 10);
}
function getKoreanToday() {
  return getKoreanDate();
}

// Format any Date or timestamp as "MMDD-HH:MM:SS" in KST.
// Independent of the user's local timezone — always shows Korean time.
function fmtKstTime(input) {
  const d = (input instanceof Date) ? input : new Date(input);
  if (isNaN(d.getTime())) return '—';
  // Shift to KST: UTC + 9h
  const kst = new Date(d.getTime() + 9 * 3600000);
  const mm = String(kst.getUTCMonth() + 1).padStart(2, '0');
  const dd = String(kst.getUTCDate()).padStart(2, '0');
  const hh = String(kst.getUTCHours()).padStart(2, '0');
  const mi = String(kst.getUTCMinutes()).padStart(2, '0');
  const ss = String(kst.getUTCSeconds()).padStart(2, '0');
  return `${mm}${dd}-${hh}:${mi}:${ss}`;
}

// All numeric output: 만(萬, 10,000) unit, NO thousand-separator commas.
// 1 decimal everywhere unless value < 1만 (then 2 decimals for precision).
// Pass suffix='' to omit '만' (used in ticker cards/rows).
function fmtMan(n, suffix = '만') {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const man = n / 10000;
  const abs = Math.abs(man);
  const sign = man < 0 ? '-' : '';
  let s;
  if (abs >= 1) s = abs.toFixed(1);
  else s = abs.toFixed(2);
  return sign + s + suffix;
}
// + sign for positives (used for P/L). Same body as fmtMan with leading '+'.
function fmtManSigned(n, suffix = '만') {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (n > 0) return '+' + fmtMan(n, suffix);
  return fmtMan(n, suffix);
}
// Fixed 2 decimals, no '만' suffix — for prices (평단/현재가/단가) and 정산금액
function fmtMan2(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n / 10000).toFixed(2);
}
// Fixed 3 decimals, no '만' suffix — for 수수료
function fmtMan3(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return (n / 10000).toFixed(3);
}
function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toString();
}
function fmtPct(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const s = (n * 100).toFixed(2) + '%';
  return n > 0 ? '+' + s : s;
}
// Local-time today in YYYY-MM-DD (Korea timezone for KR users)
function todayKR() {
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${mm}-${dd}`;
}
// "▲5.2만" (gain, red) or "▼3.1만" (loss, blue) inline badge for today's change.
// Returns '' if value is near-zero (under 100원).
function changeBadge(n, alwaysShow) {
  if (n == null || isNaN(n)) return '';
  if (!alwaysShow && Math.abs(n) < 100) return '';
  if (n === 0) return ` <span class="change-badge text-faint">▲0</span>`;
  const tri = n > 0 ? '▲' : '▼';
  return ` <span class="change-badge ${plClass(n)}">${tri}${fmtMan(Math.abs(n))}</span>`;
}
// changeBadge with % — shows "▲₩X.X만 (+Y.Y%)" or just value if base is 0
function changeBadgeWithPct(change, baseYesterday, alwaysShow) {
  if (change == null || isNaN(change)) return '';
  if (!alwaysShow && Math.abs(change) < 100) return '';
  const pct = (baseYesterday && baseYesterday !== 0) ? (change / baseYesterday) : null;
  const pctStr = pct !== null ? ` <span class="${plClass(pct)}" style="font-size:11px">(${fmtPct(pct)})</span>` : '';
  if (change === 0) return ` <span class="change-badge text-faint">▲0${pctStr}</span>`;
  const tri = change > 0 ? '▲' : '▼';
  return ` <span class="change-badge ${plClass(change)}">${tri}${fmtMan(Math.abs(change))}${pctStr}</span>`;
}
// "(d% / 1w%)" — colored, in parens; returns '' if no data
function fmtChangePcts(priceObj) {
  if (!priceObj) return '';
  const d = priceObj.changeRate, w = priceObj.week1Rate;
  if ((d === null || d === undefined) && (w === null || w === undefined)) return '';
  const parts = [];
  if (d !== null && d !== undefined) parts.push(`<span class="${plClass(d)}">${fmtPct(d)}</span>`);
  if (w !== null && w !== undefined) parts.push(`<span class="${plClass(w)}">${fmtPct(w)}</span>`);
  return ` (${parts.join(' / ')})`;
}
function plClass(n) {
  if (n === null || n === undefined || isNaN(n) || n === 0) return '';
  return n > 0 ? 'gain' : 'loss';
}
function signed(n) {
  if (n > 0) return '+' + n.toString();
  return n.toString();
}

// ============ AUTH (Service Account JWT) ============
async function getAccessToken() {
  if (state.accessToken && Date.now() < state.tokenExpiry - 60000) return state.accessToken;
  if (!state.saKey || !state.saKey.client_email || !state.saKey.private_key) {
    throw new Error('서비스 계정 JSON이 없습니다 (설정 탭에서 입력)');
  }
  if (!window.KJUR) throw new Error('JWT 라이브러리 로드 실패 (인터넷 연결 확인)');

  const now = Math.floor(Date.now() / 1000);
  const header = { alg: 'RS256', typ: 'JWT' };
  const payload = {
    iss: state.saKey.client_email,
    scope: 'https://www.googleapis.com/auth/spreadsheets',
    aud: 'https://oauth2.googleapis.com/token',
    iat: now,
    exp: now + 3600,
  };
  const jwt = KJUR.jws.JWS.sign('RS256', JSON.stringify(header), JSON.stringify(payload), state.saKey.private_key);

  const resp = await fetch('https://oauth2.googleapis.com/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`,
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error('Google Auth 실패: ' + (err.error_description || resp.status));
  }
  const d = await resp.json();
  state.accessToken = d.access_token;
  state.tokenExpiry = Date.now() + (d.expires_in * 1000);
  updateConnStatus(true);
  return state.accessToken;
}

function isConfigured() {
  return !!(state.saKey && state.saKey.client_email && state.saKey.private_key && state.sheetId);
}

function updateConnStatus(connected) {
  const el = document.getElementById('conn-status');
  if (!el) return;
  if (connected) { el.textContent = '🟢 연결됨'; el.style.color = 'var(--gain)'; }
  else if (isConfigured()) { el.textContent = '🟡 설정됨'; el.style.color = 'var(--warn)'; }
  else { el.textContent = '⚪ 미연결'; el.style.color = 'var(--text-dim)'; }
}

// Robust number parse: handles numbers, "10,380", "₩10,380", "", null
function parseNum(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return v;
  if (typeof v === 'string') {
    const cleaned = v.replace(/[^0-9.\-]/g, '');
    const n = Number(cleaned);
    return isNaN(n) ? 0 : n;
  }
  return 0;
}

// Normalize date: accepts "2025-03-21", "2025/03/21", "3/21/2025", serial number, etc. → "YYYY-MM-DD"
function parseDate(v) {
  if (v === null || v === undefined || v === '') return '';
  if (typeof v === 'number') {
    const ms = Math.round((v - 25569) * 86400000);
    const d = new Date(ms);
    if (isNaN(d.getTime())) return String(v);
    return d.toISOString().slice(0, 10);
  }
  if (typeof v === 'string') {
    const s = v.trim();
    // ISO-like: YYYY-MM-DD / YYYY/MM/DD / YYYY.MM.DD
    let m = s.match(/^(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);
    if (m) {
      return `${m[1]}-${m[2].padStart(2, '0')}-${m[3].padStart(2, '0')}`;
    }
    // US/short: M/D/YYYY or MM/DD/YYYY (or .-separated)
    m = s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/);
    if (m) {
      return `${m[3]}-${m[1].padStart(2, '0')}-${m[2].padStart(2, '0')}`;
    }
    // Fallback: try Date.parse
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
    return s.slice(0, 10);
  }
  return String(v);
}

// Parse split marker "N/M" or plain number → multiplier (price *= mul, qty /= mul)
// "1/5" → 0.2 (forward 1:5: pre-split price was 5×, qty was 1/5×)
// "5"   → 5   (reverse 5:1: pre-split price was 1/5×, qty was 5×)
function parseSplitMul(s) {
  if (!s) return 1;
  const str = String(s).trim();
  if (!str) return 1;
  const parts = str.split('/');
  if (parts.length === 2) {
    const num = parseFloat(parts[0]);
    const den = parseFloat(parts[1]);
    if (num && den) return num / den;
  } else {
    const v = parseFloat(str);
    if (v && v !== 0) return v;
  }
  return 1;
}

// ============ DATA LOADING ============
async function loadTransactions() {
  const out = [];
  for (const broker of BROKERS) {
    let rows;
    try {
      rows = await sheetGet(`${broker}!A:G`);
    } catch (e) {
      // Tab missing or empty — skip
      continue;
    }
    if (!rows || rows.length < 2) continue;
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[0]) continue;
      const origPrice = parseNum(r[2]);
      const origQty = parseNum(r[3]);
      const fees = parseNum(r[4]);
      const settle = parseNum(r[5]);
      const splitRaw = r[6] ? String(r[6]).trim() : '';
      const mul = parseSplitMul(splitRaw);
      out.push({
        date: parseDate(r[0]),
        code: String(r[1] || '').trim(),
        price: origPrice * mul,
        qty: origQty / mul,
        origPrice, origQty, splitRaw,
        fees, settle,
        seq: i,
        broker,
      });
    }
  }
  // Sort: date asc, BUYS BEFORE SELLS on same day, then broker name, then sheet row order
  out.sort((a, b) => {
    if (a.date !== b.date) return a.date < b.date ? -1 : 1;
    const aIsBuy = a.qty > 0 ? 0 : 1;
    const bIsBuy = b.qty > 0 ? 0 : 1;
    if (aIsBuy !== bIsBuy) return aIsBuy - bIsBuy;
    if (a.broker !== b.broker) return a.broker < b.broker ? -1 : 1;
    return a.seq - b.seq;
  });
  return out;
}

async function loadNames() {

}

// ============ PRICE FETCHING ============
// Yahoo Finance for KR stocks: numeric code + ".KS" (KOSPI) or ".KQ" (KOSDAQ)
const CORS_PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
];

// Single-symbol fetch returning full meta+series snapshot. Caller decides which to keep.
async function _fetchYahooOne(symbol, range = '1mo') {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=${range}`;
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(10000) });
      if (!r.ok) continue;
      const d = await r.json();
      const result = d?.chart?.result?.[0];
      if (!result) continue;
      const meta = result.meta;
      const price = meta?.regularMarketPrice;
      if (!price) continue;
      const ts = result.timestamp || [];
      const rawCloses = result.indicators?.quote?.[0]?.close || [];
      const series = [];
      for (let i = 0; i < ts.length; i++) {
        if (rawCloses[i] != null) series.push({ ts: ts[i], close: Number(rawCloses[i]) });
      }
      return {
        price: Number(price),
        meta,
        marketTime: Number(meta.regularMarketTime || 0),
        exchangeName: meta.exchangeName || '',
        series,
      };
    } catch (e) { /* try next proxy */ }
  }
  return null;
}

// Try Yahoo with both .KS and .KQ; pick the one with the most recent regularMarketTime.
// (Yahoo may return stale data for a delisted listing under one suffix while the active
// listing lives under the other suffix — for example 에스티큐브 052020 is KOSDAQ, but
// 052020.KS could return cached data for a different/delisted stock.)
async function fetchYahooPrice(code) {
  const numCode = stripA(code);
  const cached = state.codeMarket?.[code];
  const suffixes = cached ? [cached] : ['.KS', '.KQ'];

  const results = await Promise.all(suffixes.map(async sfx => {
    const snap = await _fetchYahooOne(numCode + sfx);
    return snap ? { sfx, snap } : null;
  }));
  const valid = results.filter(r => r);
  if (!valid.length) {
    // If we tried only the cached suffix, retry the other one as fallback
    if (cached) {
      const other = cached === '.KS' ? '.KQ' : '.KS';
      const snap = await _fetchYahooOne(numCode + other);
      if (snap) valid.push({ sfx: other, snap });
    }
    if (!valid.length) return null;
  }
  // Pick the listing with the most recent market time (active vs stale)
  valid.sort((a, b) => b.snap.marketTime - a.snap.marketTime);
  const winner = valid[0];

  // Compute yesterday/1w from the series (today's bar excluded, use Korean date)
  const todayISO = getKoreanToday();
  const past = winner.snap.series.filter(s => getKoreanDate(new Date(s.ts * 1000)) < todayISO);
  const yesterdayClose = past.length > 0 ? past[past.length - 1].close : null;
  const week1Close = past.length >= 5 ? past[past.length - 5].close : null;
  const price = winner.snap.price;
  const changeRate = yesterdayClose ? (price - yesterdayClose) / yesterdayClose : null;
  const week1Rate = week1Close ? (price - week1Close) / week1Close : null;

  // Cache market suffix
  if (!state.codeMarket) state.codeMarket = {};
  state.codeMarket[code] = winner.sfx;

  return {
    price,
    changeRate,
    week1Rate,
    asOf: getKoreanToday(),
    market: winner.sfx,
    exchangeName: winner.snap.exchangeName,
  };
}

async function fetchAllPrices(codes) {
  const results = {};
  const failed = [];
  const batchSize = 5;
  for (let i = 0; i < codes.length; i += batchSize) {
    const batch = codes.slice(i, i + batchSize);
    const out = await Promise.all(batch.map(c => fetchYahooPrice(c)));
    batch.forEach((c, idx) => {
      if (out[idx]) results[c] = out[idx];
      else failed.push(c);
    });
  }
  return { results, failed };
}

// Single-symbol historical fetch. Caller picks.
async function _fetchYahooHistOne(symbol, fromTs, toTs) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${fromTs}&period2=${toTs}&interval=1d`;
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url), { signal: AbortSignal.timeout(20000) });
      if (!r.ok) continue;
      const d = await r.json();
      const result = d?.chart?.result?.[0];
      if (!result) continue;
      const ts = result.timestamp || [];
      const quote = result.indicators?.quote?.[0] || {};
      const adjclose = result.indicators?.adjclose?.[0]?.adjclose || [];
      const close = quote.close || [];
      const map = {};
      let latestTs = 0;
      for (let i = 0; i < ts.length; i++) {
        const c = adjclose[i] ?? close[i];
        if (c != null) {
          const date = new Date(ts[i] * 1000).toISOString().slice(0, 10);
          map[date] = Number(c);
          if (ts[i] > latestTs) latestTs = ts[i];
        }
      }
      if (Object.keys(map).length > 0) return { map, latestTs, count: Object.keys(map).length };
    } catch (e) { /* next proxy */ }
  }
  return null;
}

// Historical daily closes via Yahoo. Uses cached suffix if available; otherwise
// dual-fetches and picks by most recent data.
async function fetchHistoricalPrices(code, fromDate, toDate) {
  const numCode = stripA(code);
  const fromTs = Math.floor(new Date(fromDate + 'T00:00:00Z').getTime() / 1000);
  const toTs = Math.floor(new Date(toDate + 'T00:00:00Z').getTime() / 1000) + 86400;
  const cached = state.codeMarket?.[code];
  const suffixes = cached ? [cached] : ['.KS', '.KQ'];

  const results = await Promise.all(suffixes.map(async sfx => {
    const snap = await _fetchYahooHistOne(numCode + sfx, fromTs, toTs);
    return snap ? { sfx, ...snap } : null;
  }));
  let valid = results.filter(r => r);
  if (!valid.length && cached) {
    const other = cached === '.KS' ? '.KQ' : '.KS';
    const snap = await _fetchYahooHistOne(numCode + other, fromTs, toTs);
    if (snap) valid = [{ sfx: other, ...snap }];
  }
  if (!valid.length) return {};
  // Prefer the listing with most recent data, then more data points
  valid.sort((a, b) => (b.latestTs - a.latestTs) || (b.count - a.count));
  const winner = valid[0];
  if (!state.codeMarket) state.codeMarket = {};
  state.codeMarket[code] = winner.sfx;
  return winner.map;
}

// Concurrency-limited parallel historical fetch
async function fetchAllHistorical(codes, fromDate, toDate, onProgress) {
  const result = {};
  const failed = [];
  const concurrency = 4;
  let done = 0;
  for (let i = 0; i < codes.length; i += concurrency) {
    const batch = codes.slice(i, i + concurrency);
    const histories = await Promise.all(batch.map(c => fetchHistoricalPrices(c, fromDate, toDate)));
    batch.forEach((c, idx) => {
      const h = histories[idx];
      if (Object.keys(h).length > 0) result[c] = h;
      else failed.push(c);
    });
    done += batch.length;
    if (onProgress) onProgress(done, codes.length);
  }
  return { result, failed };
}

// ============ ANALYTICS ============
// Moving-average cost basis (matches StockPortfolio v4):
//   Buy:  newAvgCost = (avgCost * qty + tx.qty * tx.price) / (qty + tx.qty)   [gross price, no fees]
//   Sell: realizedPL = sellQty * (tx.price - avgCost) - tx.fees               [fees deducted from PL]
//   avgCost is preserved across partial sells; clamps to 0 when qty<=0
function computeHoldings(txs) {
  const holds = {};
  const todayKST = getKoreanToday();           // KST "YYYY-MM-DD"
  const curYear = todayKST.slice(0, 4);
  const today = todayKST;
  for (const tx of txs) {
    if (!tx.code) continue;
    if (!holds[tx.code]) holds[tx.code] = {
      qty: 0, avgCost: 0,
      realizedPL: 0, realizedPLThisYear: 0, realizedPLToday: 0,
      cashFlowToday: 0,
      buyCount: 0, sellCount: 0,
    };
    const h = holds[tx.code];
    const isToday = tx.date === today;
    if (tx.qty > 0) {
      // Buy: update moving average using gross price (fees NOT added to cost basis)
      const newCost = h.avgCost * h.qty + tx.qty * tx.price;
      h.qty += tx.qty;
      h.avgCost = h.qty > 0 ? newCost / h.qty : 0;
      h.buyCount++;
      if (isToday) h.cashFlowToday -= tx.settle;
    } else if (tx.qty < 0) {
      // Sell: realized PL using moving-avg basis, fees deducted
      const sellQty = -tx.qty;
      const pl = sellQty * (tx.price - h.avgCost) - tx.fees;
      h.realizedPL += pl;
      if (tx.date.startsWith(curYear)) h.realizedPLThisYear += pl;
      if (isToday) {
        h.realizedPLToday += pl;
        h.cashFlowToday += tx.settle;
      }
      h.qty -= sellQty;
      h.sellCount++;
      if (h.qty <= 0) { h.qty = 0; h.avgCost = 0; }
    }
  }
  return holds;
}

function computeSummary(txs, holds, prices, initialCash) {
  // Cash: tracks actual cash flow including fees (settle column = gross ± fees)
  let buyTotal = 0, sellTotal = 0, feesTotal = 0;
  for (const tx of txs) {
    feesTotal += tx.fees;
    if (tx.qty > 0) buyTotal += tx.settle;      // settle for buy = price*qty + fees
    else sellTotal += tx.settle;                 // settle for sell = price*qty - fees
  }
  const cash = initialCash - buyTotal + sellTotal;

  // Holdings sums (+ today's deltas, + mvChange from price moves)
  let marketValue = 0, unrealizedPL = 0, costBasis = 0, realizedPL = 0, realizedPLYTD = 0;
  let realizedPLToday = 0, cashFlowToday = 0, mvChange = 0;
  for (const code of Object.keys(holds)) {
    const h = holds[code];
    realizedPL += h.realizedPL;
    realizedPLYTD += h.realizedPLThisYear;
    realizedPLToday += h.realizedPLToday || 0;
    cashFlowToday += h.cashFlowToday || 0;
    if (h.qty > 0) {
      const lineCost = h.qty * h.avgCost;
      costBasis += lineCost;
      const pObj = prices[code];
      const p = pObj ? pObj.price : null;
      if (p) {
        const mv = h.qty * p;
        marketValue += mv;
        unrealizedPL += mv - lineCost;
        // Today's market value change from price move (yesterday's close → now)
        if (pObj.changeRate != null && !isNaN(pObj.changeRate)) {
          const prevClose = p / (1 + pObj.changeRate);
          mvChange += h.qty * (p - prevClose);
        }
      } else {
        marketValue += lineCost;  // fallback when no price available
      }
    }
  }
  const totalAsset = cash + marketValue;
  const totalGain = totalAsset - initialCash;
  return {
    cash, marketValue, unrealizedPL, costBasis, realizedPL, realizedPLYTD,
    realizedPLToday, cashFlowToday, mvChange,
    totalAsset, totalGain, buyTotal, sellTotal, feesTotal, initialCash,
  };
}

// ============ RENDERING ============
function switchTab(name) {
  state.currentTab = name;

    state.selectedCode = null;

      ${BROKERS.filter(b => b !== 'ISA').map(b => {
        const c = state.transactions.filter(t => t.broker === b).length;
        return `<button class="broker-tab ${state.activeBroker === b ? 'active' : ''}" onclick="setActiveBroker('${b}')">${b.replace('국내', '')} <span class="text-faint" style="font-weight:400;font-size:10px">${c}</span></button>`;
      }).join('')}
      <button class="broker-tab ${state.activeBroker === 'total' ? 'active' : ''}" onclick="setActiveBroker('total')">전체 <span class="text-faint" style="font-weight:400;font-size:10px">${state.transactions.filter(t => t.broker !== 'ISA').length}</span></button>
      <div class="broker-tab-gap"></div>
      <button class="broker-tab ${state.activeBroker === 'ISA' ? 'active' : ''}" onclick="setActiveBroker('ISA')">ISA <span class="text-faint" style="font-weight:400;font-size:10px">${state.transactions.filter(t => t.broker === 'ISA').length}</span></button>
    </div>
  `;

  const txs = getTxsForBroker(state.activeBroker);
  const initialCash = getInitialCashForBroker(state.activeBroker);
  const holds = computeHoldings(txs);

  // ---- US_v4-style display: use daily_value_kr as the single source of truth ----
  // The 4 cards (총수익, 현금, 평가손익, 실현손익) and their daily changes are derived
  // from `_cachedDaily` entries via `computeStatsFromEntry`. This way the cards always
  // agree with the value-history chart.
  let latestEntry = null;
  let prevEntry = null;
  if (_cachedDaily && _cachedDaily.length > 0) {
    latestEntry = _cachedDaily[_cachedDaily.length - 1];
    prevEntry = findLastEntryBefore(latestEntry.date);
  }
  // Fallback: if cache is empty (first session or sheet not yet recalc'd), synthesize a
  // live entry from state.prices so the cards aren't blank. Daily change will be 0 until
  // a real cache row gets written by syncTodaysDailyValue().
  if (!latestEntry) latestEntry = buildLiveEntry();

  const sum = computeStatsFromEntry(state.activeBroker, latestEntry);
  const prevStats = prevEntry ? computeStatsFromEntry(state.activeBroker, prevEntry) : null;

  // If even the synthetic entry yields no stats, fall back to live computeSummary
  // (e.g., no transactions or prices yet) — keeps cards rendering.
  const liveSum = (!sum) ? computeSummary(txs, holds, state.prices, initialCash) : null;
  const S = sum || liveSum;

  // Per-card daily changes (today - yesterday). Use 0 when prev unavailable so the badge
  // shows "▲0" instead of the full value bug.
  const dTotal     = prevStats ? (S.totalGain     - prevStats.totalGain)     : 0;
  const dCash      = prevStats ? (S.cash          - prevStats.cash)          : 0;
  const dUnreal    = prevStats ? (S.unrealizedPL  - prevStats.unrealizedPL)  : 0;
  const dRealized  = prevStats ? (S.realizedPL    - prevStats.realizedPL)    : 0;

  const uplPctTotal = S.costBasis > 0 ? S.unrealizedPL / S.costBasis : null;
  const earnPctTotal = initialCash > 0 ? S.totalGain / initialCash : null;
  const cashPct = S.totalAsset > 0 ? S.cash / S.totalAsset : null;

  // Background-load the daily cache the first time overview renders without one (so the
  // user doesn't need to visit the value-history page first).
  if (!_cachedDaily && !_dailyLoadingPromise && isConfigured()) {
    _dailyLoadingPromise = loadDailyValues().then(d => {
      _cachedDaily = d;
      _dailyLoadingPromise = null;
      if (state.currentTab === 'overview' && !state.selectedCode && !state.showTotalChart) {
        renderOverview();
      }
    }).catch(() => { _dailyLoadingPromise = null; });
  }

  const cards = `
    <div class="cards-grid">
      <div class="card summary-card">
        <div class="label">📈 평가손익</div>
        <div class="row2">
          <div class="value ${plClass(S.unrealizedPL)}" style="white-space:nowrap">${fmtManSigned(S.unrealizedPL)}${changeBadgeWithPct(dUnreal, S.marketValue - dUnreal, true)}</div>
          <div class="meta">평가&nbsp;${fmtMan(S.marketValue)}<br>매수&nbsp;${fmtMan(S.costBasis)}</div>
        </div>
      </div>
      <div class="card summary-card">
        <div class="label">💵 현금</div>
        <div class="value" style="white-space:nowrap">${fmtMan(S.cash)}${changeBadgeWithPct(dCash, S.totalAsset, true)}</div>
        <div class="sub">${cashPct !== null ? `(총자산의 ${(cashPct * 100).toFixed(0)}%)` : ''}</div>
      </div>
      <div class="card summary-card" onclick="showTotalChart()" style="cursor:pointer" title="클릭하면 총자산 히스토리 차트">
        <div class="label">💰 총수익 ${earnPctTotal !== null ? `<span class="${plClass(earnPctTotal)}">(${fmtPct(earnPctTotal)})</span>` : ''}</div>
        <div class="row2">
          <div class="value ${plClass(S.totalGain)}" style="white-space:nowrap">${fmtManSigned(S.totalGain)}${changeBadgeWithPct(dTotal, S.totalAsset, true)}</div>
          <div class="meta">자산&nbsp;${fmtMan(S.totalAsset)}<br>초기&nbsp;${fmtMan(S.initialCash)}</div>
        </div>
      </div>
      <div class="card summary-card">
        <div class="label">📊 실현손익 YTD</div>
        <div class="row2">
          <div class="value ${plClass(S.realizedPLYTD)}" style="white-space:nowrap">${fmtManSigned(S.realizedPLYTD)}${changeBadge(dRealized, true)}</div>
          <div class="meta">total&nbsp;${fmtManSigned(S.realizedPL)}</div>
        </div>
      </div>
    </div>
  `;

  // Group related ETFs together (e.g., 코스피+레버리지 form one KOSPI group).
  // Group total weight determines outer ordering; within a group, by weight desc.
  function getStockGroup(code) {
    const name = state.names[code] || '';
    if (name === 'KODEX 코스피' || name === 'KODEX 레버리지') return '__KOSPI__';
    if (name === 'KODEX 반도체' || name === 'KODEX 반도체레버리지') return '__SEMI__';
    if (/나스닥100.*레버리지/.test(name)) return '__NASDAQ100_LEV__';
    if (/S&P\s*500.*레버리지/i.test(name)) return '__SP500_LEV__';
    return code; // each ungrouped stock is its own "group"
  }

  // Holdings list (only those with qty > 0)
  const heldCodes = Object.keys(holds).filter(c => holds[c].qty > 0);
  const valueOf = code => {
    const p = state.prices[code] ? state.prices[code].price : holds[code].avgCost;
    return holds[code].qty * p;
  };
  // Compute per-group total value
  const groupTotals = {};
  heldCodes.forEach(c => {
    const g = getStockGroup(c);
    groupTotals[g] = (groupTotals[g] || 0) + valueOf(c);
  });
  heldCodes.sort((a, b) => {
    const ga = getStockGroup(a), gb = getStockGroup(b);
    if (ga !== gb) return groupTotals[gb] - groupTotals[ga];   // outer: group total desc
    return valueOf(b) - valueOf(a);                            // inner: individual value desc
  });

  // 비중 = 평가금액 / 총자산 (so stocks + cash sum to 100%)
  const totalAsset = S.totalAsset;

  const holdingsHtml = heldCodes.length === 0
    ? `<div class="empty"><div class="emoji">💼</div><div>현재 보유 종목 없음</div></div>`
    : `<div class="hold-hdr">
          <div>종목 · 수량</div>
          <div>현재가 (d/1w) / 평단</div>
          <div>평가손익 / 수익률</div>
          <div>평가금액 / 매수금액</div>
          <div>비중</div>
          <div>실현 YTD / total</div>
        </div>` +
      heldCodes.map(code => {
        const h = holds[code];
        const name = state.names[code] || code;
        const priceObj = state.prices[code];
        const curPrice = priceObj ? priceObj.price : null;
        const lineCost = h.qty * h.avgCost;
        const value = curPrice ? h.qty * curPrice : null;
        const upl = curPrice ? value - lineCost : null;
        const uplPct = curPrice && h.avgCost > 0 ? (curPrice - h.avgCost) / h.avgCost : null;
        const weightPct = (value !== null && totalAsset > 0) ? value / totalAsset : null;
        return `
          <div class="holding-row" onclick="selectTicker('${code}')">
            <div class="hold-cell">
              <div class="top">${escapeHtml(name)} <span class="text-faint" style="font-size:11px;font-weight:400">${h.qty.toString()}주</span></div>
              <div class="bot" style="font-family:ui-monospace,monospace">${code}</div>
            </div>
            <div class="hold-cell hold-cell-price">
              <div class="price-now">${curPrice ? fmtMan2(curPrice) : '—'}<span class="changes">${fmtChangePcts(priceObj)}</span></div>
              <div class="price-avg">평단 ${fmtMan2(h.avgCost)}</div>
            </div>
            <div class="hold-cell">
              <div class="top ${plClass(upl)}">${upl !== null ? fmtManSigned(upl, '') : '—'}</div>
              <div class="bot ${plClass(uplPct)}">${uplPct !== null ? '(' + fmtPct(uplPct) + ')' : '—'}</div>
            </div>
            <div class="hold-cell">
              <div class="top">${value !== null ? fmtMan(value, '') : fmtMan(lineCost, '')}</div>
              <div class="bot">${fmtMan(lineCost, '')}</div>
            </div>
            <div class="hold-cell">
              <div class="top">${weightPct !== null ? (weightPct * 100).toFixed(1) + '%' : '—'}</div>
              ${weightPct !== null ? `<div class="hold-bar"><div style="width:${Math.min(100, weightPct * 100).toFixed(1)}%"></div></div>` : ''}
            </div>
            <div class="hold-cell">
              <div class="top" style="white-space:nowrap"><span class="${plClass(h.realizedPLThisYear)}">${fmtManSigned(h.realizedPLThisYear, '')}</span> <span class="text-faint">/</span> <span class="${plClass(h.realizedPL)}">${fmtManSigned(h.realizedPL, '')}</span></div>
            </div>
          </div>
        `;
      }).join('');

  const holdingsCard = `<div class="card" style="padding:0">
    <div style="padding:12px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
      <h2 style="margin:0">보유 종목 (${heldCodes.length})</h2>
      <div style="font-size:11px;color:var(--text-faint)">${pricesAsOfStr()}</div>
    </div>
    ${holdingsHtml}
  </div>`;

  // Historic holdings: previously held, now qty == 0 (fully sold)
  const historicCodes = Object.keys(holds).filter(c => holds[c].qty === 0 && !heldCodes.includes(c));
  // Sort by absolute realized PL (most impactful first)
  historicCodes.sort((a, b) => Math.abs(holds[b].realizedPL) - Math.abs(holds[a].realizedPL));

  const historicHtml = historicCodes.length === 0 ? '' : `
    <details class="card" style="padding:0;margin-top:12px">
      <summary style="padding:12px 14px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;user-select:none">
        <span style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-faint)">▶</span>
          <h2 style="margin:0;font-size:15px">📜 청산 종목 (${historicCodes.length})</h2>
        </span>
        <span style="font-size:11px;color:var(--text-faint)">과거 보유 · 현재 0주</span>
      </summary>
      <div class="hold-hdr" style="border-top:1px solid var(--border)">
        <div>종목</div>
        <div style="grid-column:span 4;text-align:left">실현 YTD / total</div>
        <div></div>
      </div>
      ${historicCodes.map(code => {
        const h = holds[code];
        const name = state.names[code] || code;
        return `
          <div class="holding-row" onclick="selectTicker('${code}')" style="opacity:0.85">
            <div class="hold-cell">
              <div class="top">${escapeHtml(name)}</div>
              <div class="bot" style="font-family:ui-monospace,monospace">${code}</div>
            </div>
            <div class="hold-cell" style="grid-column:span 4">
              <div class="top" style="white-space:nowrap">
                <span class="${plClass(h.realizedPLThisYear)}">${fmtManSigned(h.realizedPLThisYear, '')}</span>
                <span class="text-faint">/</span>
                <span class="${plClass(h.realizedPL)}">${fmtManSigned(h.realizedPL, '')}</span>
              </div>
            </div>
            <div class="hold-cell"></div>
          </div>
        `;
      }).join('')}
    </details>
    <style>
      details > summary::-webkit-details-marker { display: none; }
      details[open] > summary > span:first-child > span:first-child { transform: rotate(90deg); display: inline-block; }
    </style>
  `;

  root.innerHTML = brokerTabs + cards + holdingsCard + historicHtml;
}

// Load daily_value_kr from Sheet (date, totalValue, cash, holdings, prices)
async function loadDailyValues() {
  try {
    const rows = await sheetGet(`${DAILY_TAB}!A:E`);
    if (!rows || rows.length < 2) return [];
    const out = [];
    for (let i = 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r[0]) continue;
      // Parse holdings + prices JSON (per-code data we need for per-broker yesterday value)
      let holdings = null, prices = null;
      try { if (r[3]) holdings = JSON.parse(r[3]); } catch (e) {}
      try { if (r[4]) prices = JSON.parse(r[4]); } catch (e) {}
      out.push({
        date: parseDate(r[0]),
        totalValue: parseNum(r[1]),
        cash: parseNum(r[2]),
        holdings: holdings,
        prices: prices,
      });
    }
    out.sort((a, b) => a.date < b.date ? -1 : 1);
    return out;
  } catch (e) {
    return [];
  }
}

// Compute yesterday's totalAsset for a specific broker (or 'total') using cached daily prices.
// Returns null if yesterday's entry isn't available in cache.
// Find the most recent _cachedDaily entry whose date < givenDate (handles weekends/holidays).
// Returns null if cache empty or no entry strictly before givenDate.
function findLastEntryBefore(givenDate) {
  if (!_cachedDaily || !_cachedDaily.length) return null;
  let best = null;
  for (const entry of _cachedDaily) {
    if (entry.date < givenDate) {
      if (!best || entry.date > best.date) best = entry;
    }
  }
  return best;
}

// Unified stats computation: walks all transactions for a broker (or 'total' = sum of non-ISA),
// using `entry.prices` for market value. Returns all the values needed to render the 4 cards.
// `entry` is one row of `_cachedDaily` (or a synthetic one built from live state).
// This is the SINGLE SOURCE OF TRUTH for display — both 개요 and value-history chart use it,
// so the numbers always agree.
function computeStatsFromEntry(broker, entry) {
  if (!entry) return null;

  if (broker === 'total') {
    const parts = BROKERS.filter(b => b !== 'ISA')
      .map(b => computeStatsFromEntry(b, entry))
      .filter(x => x);
    if (!parts.length) return null;
    const init = parts.reduce((s, x) => s + x.initialCash, 0);
    const totalAsset = parts.reduce((s, x) => s + x.totalAsset, 0);
    return {
      cash:          parts.reduce((s, x) => s + x.cash, 0),
      marketValue:   parts.reduce((s, x) => s + x.marketValue, 0),
      costBasis:     parts.reduce((s, x) => s + x.costBasis, 0),
      realizedPL:    parts.reduce((s, x) => s + x.realizedPL, 0),
      realizedPLYTD: parts.reduce((s, x) => s + x.realizedPLYTD, 0),
      unrealizedPL:  parts.reduce((s, x) => s + x.unrealizedPL, 0),
      totalAsset,
      initialCash:   init,
      totalGain:     totalAsset - init,
    };
  }

  // Per-broker: walk this broker's transactions up to entry's date in the SAME order
  // as computeHoldings (date asc, buys-first, then seq). Track cash, positions, realized PL.
  const asOfDate = entry.date;
  const brokerTxs = state.transactions
    .filter(t => t.broker === broker && t.date <= asOfDate)
    .slice()
    .sort((a, b) => {
      if (a.date !== b.date) return a.date < b.date ? -1 : 1;
      const aIsBuy = a.qty > 0 ? 0 : 1;
      const bIsBuy = b.qty > 0 ? 0 : 1;
      if (aIsBuy !== bIsBuy) return aIsBuy - bIsBuy;
      return (a.seq || 0) - (b.seq || 0);
    });

  const initialCash = state.initialCashByBroker[broker] || 0;
  let cash = initialCash;
  let realizedPL = 0;
  let realizedPLYTD = 0;
  const positions = {};                 // {code: {qty, avgCost}}
  const curYear = asOfDate.slice(0, 4); // realizedPLYTD scoped to entry's year (KST)

  for (const tx of brokerTxs) {
    const txYear = tx.date.slice(0, 4);
    if (tx.qty > 0) {
      cash -= tx.settle;
      const pos = positions[tx.code] || { qty: 0, avgCost: 0 };
      const newCost = pos.qty * pos.avgCost + tx.qty * tx.price;
      pos.qty += tx.qty;
      pos.avgCost = pos.qty > 0 ? newCost / pos.qty : 0;
      positions[tx.code] = pos;
    } else {
      cash += tx.settle;
      const pos = positions[tx.code] || { qty: 0, avgCost: 0 };
      const sellQty = -tx.qty;
      const pl = sellQty * (tx.price - pos.avgCost) - (tx.fees || 0);
      realizedPL += pl;
      if (txYear === curYear) realizedPLYTD += pl;
      pos.qty -= sellQty;
      if (pos.qty <= 0) { pos.qty = 0; pos.avgCost = 0; }
      positions[tx.code] = pos;
    }
  }

  let marketValue = 0, costBasis = 0;
  for (const code in positions) {
    if (positions[code].qty <= 0) continue;
    const p = entry.prices ? entry.prices[code] : null;
    if (p == null) continue;
    marketValue += positions[code].qty * p;
    costBasis   += positions[code].qty * positions[code].avgCost;
  }

  const totalAsset = cash + marketValue;
  return {
    cash,
    marketValue,
    costBasis,
    realizedPL,
    realizedPLYTD,
    unrealizedPL: marketValue - costBasis,
    totalAsset,
    initialCash,
    totalGain: totalAsset - initialCash,
  };
}

// Build a synthetic "today" entry from live state.prices. Used when _cachedDaily is empty
// (e.g., first ever load) so the cards still render with current values.
function buildLiveEntry() {
  const livePrices = {};
  for (const code in state.prices) {
    const v = state.prices[code];
    if (v && v.price != null) livePrices[code] = v.price;
  }
  return { date: getKoreanToday(), prices: livePrices, totalValue: null, cash: null };
}

// Backward-compat shims (some chart code still uses these names).
function computePerBrokerYesterdayValue(broker, yEntry, asOfDate) {
  const e = yEntry ? { ...yEntry, date: asOfDate || yEntry.date } : null;
  const s = computeStatsFromEntry(broker, e);
  return s ? s.totalAsset : null;
}
function computeYesterdayBrokerValue(broker, yesterdayKST) {
  const e = findLastEntryBefore(addOneDay(yesterdayKST));
  if (!e) return null;
  const s = computeStatsFromEntry(broker, e);
  return s ? s.totalAsset : null;
}

// Compute "non-ISA total value" for a daily cache entry. Falls back to entry.totalValue when
// prices snapshot is missing (old rows) — slightly inaccurate by ISA's contribution but
// keeps the chart usable even before a fresh 재계산.
function getDayNonISATotal(dailyEntry) {
  if (!dailyEntry) return null;
  if (!dailyEntry.prices) return dailyEntry.totalValue;
  let total = 0;
  for (const b of BROKERS.filter(x => x !== 'ISA')) {
    const v = computePerBrokerYesterdayValue(b, dailyEntry, dailyEntry.date);
    if (v != null) total += v;
  }
  return total;
}

// Fetch full historical daily closes for a Yahoo symbol (indices supported with ^ prefix).
async function fetchYahooHist(symbol, range = '5y') {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=${range}`;
  for (const proxy of CORS_PROXIES) {
    try {
      const r = await fetch(proxy + encodeURIComponent(url));
      if (!r.ok) continue;
      const data = await r.json();
      const result = data.chart && data.chart.result && data.chart.result[0];
      if (!result) continue;
      const closes = result.indicators && result.indicators.quote && result.indicators.quote[0] && result.indicators.quote[0].close;
      const ts = result.timestamp;
      if (!closes || !ts) continue;
      const out = {};
      for (let i = 0; i < ts.length; i++) {
        if (closes[i] == null) continue;
        const d = new Date(ts[i] * 1000);
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        out[`${d.getFullYear()}-${mm}-${dd}`] = closes[i];
      }
      return out;
    } catch (e) {}
  }
  return {};
}

function filterByPeriod(daily, period) {
  if (period === 'total') return daily.slice();
  if (period === '2025') return daily.filter(d => d.date >= '2025-01-01' && d.date <= '2025-12-31');
  if (period === '2026') return daily.filter(d => d.date >= '2026-01-01' && d.date <= '2026-12-31');
  // KST-based cutoff: parse today's KST date and step back N months/years using UTC arithmetic
  const todayKST = getKoreanToday();
  const [yy, mm0, dd0] = todayKST.split('-').map(Number);
  const cutD = new Date(Date.UTC(yy, mm0 - 1, dd0));
  if (period === '1y') cutD.setUTCFullYear(cutD.getUTCFullYear() - 1);
  else if (period === '6m') cutD.setUTCMonth(cutD.getUTCMonth() - 6);
  else if (period === '3m') cutD.setUTCMonth(cutD.getUTCMonth() - 3);
  else return daily.slice();
  const cutoff = cutD.toISOString().slice(0, 10);
  return daily.filter(d => d.date >= cutoff);
}

async function drawTotalChart() {
  const status = document.getElementById('chartStatus');
  if (!status) return;

  // Load daily values (cache for session)
  if (!_cachedDaily) {
    status.textContent = 'daily_value_kr 데이터 로딩 중...';
    _cachedDaily = await loadDailyValues();
  }
  if (!_cachedDaily.length) {
    status.textContent = '⚠ daily_value_kr 데이터 없음. 설정 → "daily_value 재계산" 먼저 실행하세요.';
    return;
  }

  // Fetch benchmarks on demand
  const enabledBenches = BENCH_TICKERS.filter(b => state.chartBenches[b.code]);
  for (const b of enabledBenches) {
    if (_cachedBench[b.code]) continue;
    status.textContent = `${b.name} 시세 로딩...`;
    _cachedBench[b.code] = await fetchYahooHist(b.code, '5y');
  }

  // Filter by selected period
  const series = filterByPeriod(_cachedDaily, state.chartPeriod);
  if (!series.length) {
    status.textContent = '선택한 기간에 데이터 없음.';
    document.getElementById('chartSummary').innerHTML = '';
    return;
  }

  // Pre-compute non-ISA total for every entry in series (so we don't repeat work in tooltip / summary)
  const seriesNonISA = series.map(d => getDayNonISATotal(d) || 0);

  // Normalize: base = previous TRADING day's non-ISA close (or first value if no previous day).
  // We look back through _cachedDaily (which only has trading days) to find the entry
  // immediately before series[0]. This makes period-to-period transitions seamless
  // (end of 2025 == start of 2026).
  const labels = series.map(d => d.date);
  let baseValue = seriesNonISA[0] || 1;
  if (state.chartPeriod !== 'total') {
    const firstDate = series[0].date;
    // Find the last _cachedDaily entry strictly before firstDate
    let prevEntry = null;
    for (const d of _cachedDaily) {
      if (d.date < firstDate && (!prevEntry || d.date > prevEntry.date)) prevEntry = d;
    }
    if (prevEntry) {
      const prevVal = getDayNonISATotal(prevEntry);
      if (prevVal) baseValue = prevVal;
    }
  }
  const portfolioData = seriesNonISA.map(v => v / baseValue * 100);

  const benchDatasets = [];
  for (const b of enabledBenches) {
    const hist = _cachedBench[b.code] || {};
    const startDate = series[0].date;
    // For benchmarks, also use previous day if available (to match portfolio base)
    let benchBase = null;
    if (state.chartPeriod !== 'total') {
      const firstDateObj = new Date(startDate + 'T00:00:00');
      const prevDateObj = new Date(firstDateObj);
      prevDateObj.setDate(prevDateObj.getDate() - 1);
      const prevDate = prevDateObj.toISOString().split('T')[0];
      if (hist[prevDate] != null) benchBase = hist[prevDate];
    }
    // Fallback to first date in period if no previous day
    if (benchBase === null) {
      const histDates = Object.keys(hist).filter(d => d >= startDate).sort();
      if (!histDates.length) continue;
      benchBase = hist[histDates[0]];
    }
    let lastVal = null;
    const data = [];
    const rawData = [];   // parallel array of raw closes for tooltip
    for (const d of series) {
      if (hist[d.date] != null) lastVal = hist[d.date];
      data.push(lastVal != null ? lastVal / benchBase * 100 : null);
      rawData.push(lastVal);
    }
    benchDatasets.push({
      label: b.name,
      data,
      borderColor: b.color,
      backgroundColor: b.color,
      borderWidth: 1.5,
      tension: 0,
      pointRadius: 0,
      spanGaps: true,
      _rawData: rawData,    // custom field consumed by tooltip callback
      _code: b.code,
    });
  }

  // Draw
  if (_chartInstance) { _chartInstance.destroy(); _chartInstance = null; }
  const ctx = document.getElementById('chartCanvas').getContext('2d');
  _chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: '내 포트폴리오',
          data: portfolioData,
          borderColor: '#22d3ee',           // cyan (v4 style)
          backgroundColor: '#22d3ee',
          borderWidth: 2.5,
          tension: 0,
          pointRadius: 0,
        },
        ...benchDatasets,
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      layout: { padding: { right: 60 } },
      scales: {
        x: {
          type: 'category',
          ticks: { color: '#888', maxTicksLimit: 8, font: { size: 10 } },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
        y: {
          type: state.chartScale === 'log' ? 'logarithmic' : 'linear',
          ticks: { color: '#888', font: { size: 10 }, callback: v => v.toFixed(0) },
          grid: { color: 'rgba(255,255,255,0.05)' },
        },
      },
      plugins: {
        legend: { position: 'top', labels: { color: '#ccc', font: { size: 11 }, boxWidth: 12, boxHeight: 12 } },
        tooltip: {
          mode: 'index', intersect: false,
          backgroundColor: 'rgba(0, 0, 0, 0.85)',
          titleColor: '#fff',
          titleFont: { size: 12, weight: '600', family: 'ui-sans-serif, system-ui, sans-serif' },
          bodyColor: '#e5e5e5',
          bodyFont: { size: 12, family: 'ui-monospace, monospace' },
          borderColor: 'rgba(255, 255, 255, 0.1)',
          borderWidth: 1,
          padding: 10,
          cornerRadius: 6,
          displayColors: true,
          boxWidth: 10,
          boxHeight: 10,
          callbacks: {
            label: (tctx) => {
              const v = tctx.parsed.y;
              if (v == null) return '';
              const idx = tctx.dataIndex;
              // Portfolio: just "105.3 (+₩50.2만)" without label - uses non-ISA total
              if (tctx.dataset.label === '내 포트폴리오' && series[idx]) {
                const totalValue = seriesNonISA[idx];
                // initialCash for 'total' already excludes ISA; this gives us the
                // "전체 (ISA 제외)" totalGain that matches the cards on 개요.
                const initialCash = getInitialCashForBroker('total');
                const totalGain = totalValue - initialCash;
                return `${v.toFixed(1)} (${fmtManSigned(totalGain)})`;
              }
              // Benchmarks: short label + value + (raw) for indices only
              const raw = tctx.dataset._rawData ? tctx.dataset._rawData[idx] : null;
              const code = tctx.dataset._code;
              // Shorten benchmark labels
              let shortLabel = tctx.dataset.label
                .replace('KODEX', '')

                .replace('KOSDAQ', '코스닥')
                .trim();
              
              // For indices (starting with ^), show raw value

              if (isIndex && raw != null) {
                const rawStr = raw.toLocaleString('en-US', { maximumFractionDigits: 1, minimumFractionDigits: 1 });

              }
              // For ETFs, just normalized value (no raw price)
              return `${shortLabel}: ${v.toFixed(1)}`;
            },
          },
        },
      },
    },
    plugins: [{
      id: 'endValueLabels',
      afterDatasetsDraw(chart) {
        const ctx = chart.ctx;
        ctx.save();
        ctx.font = 'bold 11px ui-monospace, monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        
        // Collect last points with values, avoid overlap by sorting & shifting
        const labels = [];
        chart.data.datasets.forEach((dataset, i) => {
          const meta = chart.getDatasetMeta(i);
          if (!meta.visible || !dataset.data.length) return;
          
          // Find LAST non-null value
          let lastIdx = dataset.data.length - 1;
          while (lastIdx >= 0 && dataset.data[lastIdx] == null) lastIdx--;
          if (lastIdx < 0) return;
          
          const lastPoint = meta.data[lastIdx];
          if (!lastPoint) return;
          
          const value = dataset.data[lastIdx];
          labels.push({
            x: lastPoint.x,
            y: lastPoint.y,
            value: value,
            color: dataset.borderColor || '#ccc',
          });
        });
        
        // Sort by y to detect overlap & shift
        labels.sort((a, b) => a.y - b.y);
        const minGap = 14;
        for (let i = 1; i < labels.length; i++) {
          if (labels[i].y - labels[i-1].y < minGap) {
            labels[i].y = labels[i-1].y + minGap;
          }
        }
        
        // Draw labels with background pill
        labels.forEach(lbl => {
          const text = lbl.value.toFixed(1);
          const textW = ctx.measureText(text).width;
          const padX = 5, padY = 3;
          const boxX = lbl.x + 6;
          const boxY = lbl.y - 8;
          const boxW = textW + padX*2;
          const boxH = 16;
          
          // Background pill
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.beginPath();
          if (ctx.roundRect) {
            ctx.roundRect(boxX, boxY, boxW, boxH, 4);
          } else {
            ctx.rect(boxX, boxY, boxW, boxH);
          }
          ctx.fill();
          
          // Text
          ctx.fillStyle = lbl.color;
          ctx.fillText(text, boxX + padX, lbl.y);
        });
        
        ctx.restore();
      }
    }],
  });

  const startD = series[0].date;
  const endD = series[series.length-1].date;
  const portfolioEnd = portfolioData[portfolioData.length-1];

  const newestData = _cachedDaily[_cachedDaily.length-1].date;
  const newestTx = state.transactions.length ? state.transactions[state.transactions.length-1].date : newestData;
  const stale = newestTx > newestData;
  const staleNote = stale ? ` · ⚠ 최신 거래일(${newestTx})까지 미반영 → "🔄 재계산" 클릭` : '';
  status.innerHTML = `${series.length}일 · ${startD} → ${endD} · ${(portfolioEnd-100).toFixed(1)}% (base=100, ${state.chartScale} scale) · daily_value 최종: <b>${newestData}</b>${staleNote}`;

  // Summary table: chosen period + each year (2025, 2026)
  renderChartSummary(series);

function renderChartSummary(periodSeries) {
  const el = document.getElementById('chartSummary');
  if (!el) return;
  if (!periodSeries || !periodSeries.length) {
    el.innerHTML = '<div class="card" style="margin-top:8px;padding:12px;color:var(--text-faint)">데이터 없음</div>';
    return;
  }

  // Find the entry strictly before a given date (uses _cachedDaily — only trading days).
  // Returns null if no earlier entry exists.
  const lastBefore = (dateStr) => {
    let best = null;
    for (const d of _cachedDaily) {
      if (d.date < dateStr && (!best || d.date > best.date)) best = d;
    }
    return best;
  };

  // Build a line where startValue = previous-trading-day's close (so end of 2025 == start of 2026),
  // endValue = last-trading-day close within the period. Both use non-ISA totals.
  const buildLine = (label, rows) => {
    if (!rows || !rows.length) return `<div style="color:var(--text-faint);font-size:13px">${label}: 데이터 없음</div>`;
    const firstRow = rows[0];
    const prevTrading = lastBefore(firstRow.date);
    const startValue = (prevTrading ? getDayNonISATotal(prevTrading) : getDayNonISATotal(firstRow)) || 0;
    const endValue = getDayNonISATotal(rows[rows.length - 1]) || 0;
    const diff = endValue - startValue;
    const pct = startValue > 0 ? diff / startValue : null;
    const cls = plClass(diff);
    const days = rows.length;
    return `<div style="margin-bottom:4px;font-size:13px">
      <b>${label}</b> <span class="text-faint" style="font-size:11px">(${days}d)</span>: 
      ₩${fmtMan(startValue)} → ₩${fmtMan(endValue)}, 
      <span class="${cls}">${fmtPct(pct)}</span>
      <span class="${cls}" style="font-size:12px">(${fmtManSigned(diff)})</span>
    </div>`;
  };

  // Auto-detect available years in data, then sort DESCENDING (newest first)
  const yearsInData = new Set();
  for (const d of _cachedDaily) {
    if (d.date && d.date.length >= 4) yearsInData.add(d.date.slice(0, 4));
  }
  const sortedYears = [...yearsInData].sort().reverse();
  const yearSeries = (y) => _cachedDaily.filter(d => d.date >= `${y}-01-01` && d.date <= `${y}-12-31`);

  el.innerHTML = `
    <div class="card" style="margin-top:8px;padding:12px 14px;font-size:13px;line-height:1.7">
      ${buildLine(state.chartPeriod.toUpperCase(), periodSeries)}
      ${sortedYears.map(y => buildLine(y, yearSeries(y))).join('')}
    </div>
  `;
}

// Per-ticker time series: walks transactions chronologically using each daily-cache
// date to produce running cost/marketValue/unrealizedPL/realizedPL/totalPL/price arrays.
// Matches computeHoldings() logic exactly: moving-average cost, fees applied to realized PL.
function computeTickerTimeSeries(code) {
  if (!_cachedDaily || !_cachedDaily.length) return null;
  const txs = state.transactions
    .filter(t => t.code === code)
    .slice()
    .sort((a, b) => a.date < b.date ? -1 : (a.date > b.date ? 1 : 0));
  if (!txs.length) return null;

  const dailySorted = [..._cachedDaily].slice().sort((a, b) => a.date < b.date ? -1 : 1);
  const firstTxDate = txs[0].date;

  let qty = 0, avgCost = 0, realizedPL = 0, txIdx = 0;
  const out = { dates: [], cost: [], marketValue: [], unrealizedPL: [], realizedPL: [], totalPL: [], price: [] };

  for (const entry of dailySorted) {
    if (entry.date < firstTxDate) continue;
    // Process all transactions on or before this date
    while (txIdx < txs.length && txs[txIdx].date <= entry.date) {
      const tx = txs[txIdx];
      if (tx.qty > 0) {
        const newCost = avgCost * qty + tx.qty * tx.price;
        qty += tx.qty;
        avgCost = qty > 0 ? newCost / qty : 0;
      } else if (tx.qty < 0) {
        const sellQty = -tx.qty;
        const pl = sellQty * (tx.price - avgCost) - (tx.fees || 0);
        realizedPL += pl;
        qty -= sellQty;
        if (qty <= 0) { qty = 0; avgCost = 0; }
      }
      txIdx++;
    }
    const price = entry.prices ? entry.prices[code] : null;
    const cost = qty * avgCost;
    const mv = (qty > 0 && price) ? qty * price : 0;
    const upl = mv - cost;
    out.dates.push(entry.date);
    out.cost.push(cost);
    out.marketValue.push(mv);
    out.unrealizedPL.push(upl);
    out.realizedPL.push(realizedPL);
    out.totalPL.push(realizedPL + upl);
    out.price.push(price);
  }
  return out;
}
